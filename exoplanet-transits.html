<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exoplanet Transit Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    color: white;
    background: linear-gradient(135deg,
      rgba(216,191,255,0.55),
      rgba(189,255,214,0.55)
    );
    background-attachment: fixed;
  }

  .overlay {
    padding: 40px 20px 80px;
  }

  .moon-home {
    position: fixed;
    right: 20px;
    top: 20px;
    width: 60px;
    height: 60px;
    background: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg') center/cover no-repeat;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 10px;
    color: white;
    text-decoration: none;
    border: 2px solid rgba(255,255,255,0.4);
    box-shadow: 0 0 15px rgba(255,255,255,0.4);
    transition: 0.3s;
    z-index: 10;
  }

  .moon-home:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(255,255,255,0.6);
  }

  h1 {
    text-align: center;
    font-size: 36px;
    margin-bottom: 10px;
  }

  p {
    text-align: center;
    font-size: 16px;
    opacity: 0.9;
    margin-bottom: 30px;
  }

  .sim-container {
    max-width: 900px;
    margin: 0 auto;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px;
    padding: 20px;
    backdrop-filter: blur(12px);
  }

  canvas {
    display: block;
    margin: 0 auto;
    background: rgba(0,0,0,0.25);
    border-radius: 12px;
  }

  .controls {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
  }

  .control-box {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.18);
    padding: 12px;
    border-radius: 12px;
  }

  .control-box label {
    font-size: 14px;
    font-weight: 600;
  }

  .control-box input {
    width: 100%;
    margin-top: 6px;
  }

  #graph {
    margin-top: 30px;
    width: 100%;
    height: 200px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
  }
</style>
</head>

<body>
<div class="overlay">

<a class="moon-home" href="../experiments.html">Lab</a>

<h1>🔭 Exoplanet Transit Simulator</h1>
<p>Watch a planet orbit its star and see the brightness dip during a transit.</p>

<div class="sim-container">

  <canvas id="sim" width="600" height="300"></canvas>

  <div class="controls">

    <div class="control-box">
      <label>Planet Size</label>
      <input type="range" id="planetSize" min="5" max="40" value="20">
    </div>

    <div class="control-box">
      <label>Orbit Speed</label>
      <input type="range" id="orbitSpeed" min="1" max="10" value="4">
    </div>

    <div class="control-box">
      <label>Star Brightness</label>
      <input type="range" id="starBrightness" min="0.7" max="1" step="0.01" value="1">
    </div>

  </div>

  <canvas id="graph"></canvas>

</div>

</div>

<script>
/* ------------------ ORBIT SIMULATION ------------------ */

const canvas = document.getElementById("sim");
const ctx = canvas.getContext("2d");

let angle = 0;

function drawSim() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const starX = canvas.width / 2;
  const starY = canvas.height / 2;

  const planetSize = Number(document.getElementById("planetSize").value);
  const orbitSpeed = Number(document.getElementById("orbitSpeed").value);

  const orbitRadius = 120;

  const planetX = starX + Math.cos(angle) * orbitRadius;
  const planetY = starY + Math.sin(angle) * orbitRadius;

  angle += orbitSpeed * 0.01;

  ctx.beginPath();
  ctx.arc(starX, starY, 40, 0, Math.PI * 2);
  ctx.fillStyle = "yellow";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(planetX, planetY, planetSize, 0, Math.PI * 2);
  ctx.fillStyle = "lightblue";
  ctx.fill();

  updateBrightness(planetX, planetY, starX, starY, planetSize);
  requestAnimationFrame(drawSim);
}

drawSim();

/* ------------------ LIGHT CURVE GRAPH ------------------ */

const graph = document.getElementById("graph");
const g = graph.getContext("2d");

let brightnessData = [];

function updateBrightness(px, py, sx, sy, pSize) {
  const starBrightness = Number(document.getElementById("starBrightness").value);

  let brightness = starBrightness;

  const dx = px - sx;
  const dy = py - sy;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 40 + pSize) {
    brightness -= 0.2;
  }

  brightnessData.push(brightness);
  if (brightnessData.length > 300) brightnessData.shift();

  drawGraph();
}

function drawGraph() {
  g.clearRect(0, 0, graph.width, graph.height);

  g.beginPath();
  g.moveTo(0, graph.height - brightnessData[0] * graph.height);

  for (let i = 1; i < brightnessData.length; i++) {
    g.lineTo(i * (graph.width / 300), graph.height - brightnessData[i] * graph.height);
  }

  g.strokeStyle = "white";
  g.lineWidth = 2;
  g.stroke();
}
</script>

</body>
</html>

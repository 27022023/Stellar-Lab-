<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Lab</title>

<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: radial-gradient(circle at top, #0a0f1f, #000);
        color: #e6e6e6;
        overflow-x: hidden;
    }

    /* NAVBAR */
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 14px 40px;
        display: flex;
        justify-content: space-between;
        background: rgba(5, 8, 20, 0.9);
        backdrop-filter: blur(10px);
        z-index: 10;
    }

    .nav-left {
        display: flex;
        gap: 20px;
        align-items: center;
    }

    .logo {
        font-size: 22px;
        font-weight: 700;
        color: #9bb1ff;
    }

    .nav-links span {
        margin-right: 18px;
        cursor: pointer;
        color: #cdd9ff;
    }

    .nav-right {
        display: flex;
        gap: 20px;
        align-items: center;
    }

    .launch-btn {
        padding: 8px 18px;
        border-radius: 999px;
        background: linear-gradient(90deg, #4c5cff, #7b8bff);
        color: white;
        font-weight: 600;
        border: none;
        cursor: pointer;
    }

    /* HERO */
    .hero {
        padding-top: 90px;
        min-height: 100vh;
        position: relative;
        overflow: hidden;
    }

    /* STAR */
    .star {
        position: absolute;
        top: 40px;
        left: 55%;
        width: 350px;
        height: 350px;
        background: radial-gradient(circle, #fff, #ffffff55, transparent);
        filter: blur(40px);
        opacity: 0.9;
    }

    /* MOON */
    .moon {
        position: absolute;
        top: 120px;
        right: 10%;
        width: 160px;
        height: 160px;
        background: radial-gradient(circle, #dcdcdc, #8a8a8a);
        border-radius: 50%;
        box-shadow: 0 0 40px #fff;
    }

    .moon::after {
        content: "";
        position: absolute;
        top: 40px;
        left: 50px;
        width: 40px;
        height: 40px;
        background: #bfbfbf;
        border-radius: 50%;
        opacity: 0.4;
    }

    /* PLANET */
    .planet {
        position: absolute;
        bottom: -200px;
        left: 50%;
        transform: translateX(-50%);
        width: 1400px;
        height: 1400px;
        background: radial-gradient(circle at 50% 30%, #2f3f7a, #0a0f2a);
        border-radius: 50%;
        box-shadow: 0 -80px 160px #000 inset;
    }

    /* ASTRONAUT */
    .astronaut {
        position: absolute;
        bottom: 260px;
        left: 18%;
        width: 140px;
        height: 260px;
    }

    .helmet {
        width: 120px;
        height: 120px;
        background: radial-gradient(circle at 30% 30%, #fff, #bfbfbf);
        border-radius: 50%;
        margin-left: 10px;
        box-shadow: 0 0 20px #ffffffaa;
    }

    .visor {
        width: 80px;
        height: 50px;
        background: radial-gradient(circle, #1a1a1a, #000);
        border-radius: 20px;
        margin: 35px auto 0;
    }

    .body {
        width: 140px;
        height: 140px;
        background: linear-gradient(#d9d9d9, #8a8a8a);
        border-radius: 20px;
        margin-top: -10px;
        box-shadow: 0 0 20px #ffffff55;
    }

    .arm {
        width: 40px;
        height: 100px;
        background: linear-gradient(#d9d9d9, #8a8a8a);
        border-radius: 20px;
        position: absolute;
        top: 140px;
        left: -20px;
        transform: rotate(-20deg);
    }

    .speech {
        position: absolute;
        top: -80px;
        left: -40px;
        width: 320px;
        background: rgba(5, 8, 20, 0.85);
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #4c5cff;
        font-size: 15px;
    }

    /* LAB */
    .lab {
        position: absolute;
        bottom: 260px;
        right: 18%;
        width: 300px;
        height: 200px;
        background: radial-gradient(circle at top, #3b4b7f, #151a33);
        border-radius: 200px 200px 40px 40px;
        box-shadow: 0 0 30px #4c5cff55;
        border: 1px solid #4c5cff55;
        overflow: hidden;
    }

    .lab-inner {
        position: absolute;
        inset: 20px;
        background: rgba(5, 8, 20, 0.8);
        border-radius: 20px;
        border: 1px solid #4c5cff33;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        font-size: 30px;
    }

    /* ROCKET */
    .rocket {
        position: absolute;
        top: 180px;
        left: 5%;
        width: 80px;
        height: 200px;
        background: linear-gradient(#f5f5f5, #bfbfbf);
        border-radius: 40px;
        box-shadow: 0 0 20px #ffffffaa;
    }

    .rocket::before {
        content: "";
        position: absolute;
        bottom: -20px;
        left: 50%;
        transform: translateX(-50%);
        width: 30px;
        height: 30px;
        background: radial-gradient(circle at top, #ffb347, #ff6b6b, transparent);
        filter: blur(4px);
    }

    /* TITLE */
    .title {
        position: absolute;
        top: 140px;
        right: 12%;
        font-size: 70px;
        font-weight: 800;
        color: #9bb1ff;
        text-shadow: 0 0 20px #4c5cff, 0 0 40px #4c5cff;
    }

    .tagline {
        position: absolute;
        top: 220px;
        right: 12%;
        font-size: 20px;
        color: #cdd9ff;
    }

    /* BOTTOM MENU */
    .menu {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
    }

    .menu div {
        padding: 10px 20px;
        background: rgba(10, 14, 32, 0.9);
        border-radius: 999px;
        border: 1px solid #3a3f66;
        cursor: pointer;
        font-size: 16px;
    }

    .menu div:hover {
        border-color: #4c5cff;
        color: #ffffff;
    }

</style>
</head>

<body>

<header class="navbar">
    <div class="nav-left">
        <div class="logo">Stellar Lab</div>
        <div class="nav-links">
            <span>Home</span>
            <span>Exhibits</span>
            <span>Experiments</span>
            <span>Atlas</span>
            <span>Community</span>
            <span>About</span>
        </div>
    </div>
    <div class="nav-right">
        <span>Chatbot: Starlight</span>
        <button class="launch-btn">Launch Lab</button>
    </div>
</header>

<section class="hero">

    <div class="star"></div>
    <div class="moon"></div>
    <div class="planet"></div>

    <div class="rocket"></div>

    <div class="astronaut">
        <div class="helmet">
            <div class="visor"></div>
        </div>
        <div class="body"></div>
        <div class="arm"></div>
        <div class="speech">
            Hello!! Welcome to Stellar Lab!! 🧪<br>
            Let’s explore space together!! 🌌🚀
        </div>
    </div>

    <div class="lab">
        <div class="lab-inner">
            🧪 🔬 🧫 ⚗️
        </div>
    </div>

    <div class="title">Stellar Lab</div>
    <div class="tagline">Explore. Experiment. Discover Life Beyond.</div>

    <div class="menu">
        <div>Learn</div>
        <div>Explore</div>
        <div>Experiment</div>
        <div>Discover Life</div>
        <div>Chatbot: Starlight</div>
    </div>

</section>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Lab</title>

<style>
    body {
        margin: 0;
        background: radial-gradient(circle at center, #0a0f2a, #000);
        font-family: Arial, sans-serif;
        overflow-x: hidden;
        color: white;
    }

    /* PLANET */
    .planet {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 900px;
        height: 900px;
        background: radial-gradient(circle at 50% 30%, #3a4a7a, #0a0f2a);
        border-radius: 50%;
        overflow: hidden;
    }

    /* MOON */
    .moon {
        position: absolute;
        top: 120px;
        right: 200px;
        width: 150px;
        height: 150px;
        background: radial-gradient(circle, #d9d9d9, #888);
        border-radius: 50%;
        box-shadow: 0 0 40px #fff;
    }

    /* STAR BEHIND */
    .star {
        position: absolute;
        top: 50px;
        left: 50%;
        transform: translateX(-50%);
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, #fff, transparent);
        filter: blur(40px);
        opacity: 0.7;
    }

    /* ASTRONAUT */
    .astronaut {
        position: absolute;
        bottom: 300px;
        left: 25%;
        width: 120px;
        height: 200px;
        background: linear-gradient(#ccc, #888);
        border-radius: 20px;
    }
    .astronaut::after {
        content: "Hello!! Welcome to Stellar Lab!! 🧪 Let's explore space together!!🌌🚀";
        position: absolute;
        top: -60px;
        left: -100px;
        width: 350px;
        font-size: 18px;
        background: rgba(0,0,0,0.6);
        padding: 10px;
        border-radius: 10px;
    }

    /* LAB SETUP */
    .lab {
        position: absolute;
        bottom: 300px;
        right: 20%;
        width: 250px;
        height: 200px;
        background: rgba(255,255,255,0.1);
        border: 2px solid #4cc9ff;
        border-radius: 10px;
        padding: 10px;
    }
    .lab::after {
        content: "🧪 🔬 🧫 ⚗️";
        font-size: 50px;
        position: absolute;
        top: 40px;
        left: 60px;
    }

    /* NEON TITLE */
    .title {
        position: absolute;
        top: 120px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 70px;
        font-weight: bold;
        color: #4cc9ff;
        text-shadow: 0 0 20px #4cc9ff, 0 0 40px #4cc9ff;
    }

    /* ROCKETSHIP */
    .rocket {
        position: absolute;
        top: 300px;
        left: -200px;
        width: 80px;
        height: 150px;
        background: linear-gradient(#fff, #aaa);
        border-radius: 40px;
        animation: fly 10s linear infinite;
    }
    @keyframes fly {
        0% { left: -200px; top: 300px; }
        50% { left: 50%; top: 150px; }
        100% { left: 120%; top: 300px; }
    }

    /* BOTTOM MENU */
    .menu {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 40px;
        font-size: 22px;
    }
    .menu div {
        cursor: pointer;
        padding: 10px 20px;
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
        border: 1px solid #4cc9ff;
        transition: 0.3s;
    }
    .menu div:hover {
        background: rgba(255,255,255,0.2);
    }
</style>
</head>

<body>

<div class="star"></div>
<div class="moon"></div>
<div class="planet"></div>

<div class="astronaut"></div>
<div class="lab"></div>

<div class="rocket"></div>

<div class="title">Stellar Lab</div>

<div class="menu">
    <div>Learn</div>
    <div>Explore</div>
    <div>Experiment</div>
    <div>Discover Life</div>
    <div>Chatbot: Starlight</div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stellar Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  overflow-x: hidden;
}

/* FULLSCREEN HERO IMAGE */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  background: url('IMG-55ab84f13a69803cad7d878c3b94da4d-V (1).jpg') center/cover no-repeat;
}

/* CLICKABLE AREAS (INVISIBLE BUTTONS) */
.click-zone {
  position: absolute;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

/* TAP SHINE EFFECT */
.click-zone:active {
  transform: scale(0.97);
  box-shadow: 0 0 25px rgba(255,255,255,0.4);
}

/* POSITIONING THE FOUR MODULE BUTTONS */
#learn {
  top: 72%;
  left: 12%;
  width: 18%;
  height: 10%;
}

#experiment {
  top: 72%;
  left: 32%;
  width: 18%;
  height: 10%;
}

#explore {
  top: 72%;
  left: 52%;
  width: 18%;
  height: 10%;
}

#discover {
  top: 72%;
  left: 72%;
  width: 18%;
  height: 10%;
}
</style>
</head>

<body>

<div class="hero">

  <!-- INVISIBLE CLICKABLE BUTTONS -->
  <div id="learn" class="click-zone" onclick="location.href='learn.html'"></div>
  <div id="experiment" class="click-zone" onclick="location.href='experiment.html'"></div>
  <div id="explore" class="click-zone" onclick="location.href='explore.html'"></div>
  <div id="discover" class="click-zone" onclick="location.href='discover.html'"></div>

</div>

</body>
</html>

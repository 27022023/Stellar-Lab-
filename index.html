<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Lab</title>

<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: radial-gradient(circle at top, #0a0f1f, #000);
        color: #ffffff;
        overflow-x: hidden;
    }

    /* NAVBAR */
    .navbar {
        position: fixed;
        top: 0; left: 0; right: 0;
        padding: 16px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(5, 8, 20, 0.9);
        backdrop-filter: blur(10px);
        z-index: 10;
    }
    .logo {
        font-size: 20px;
        font-weight: 700;
        color: #9bb1ff;
    }
    .nav-links {
        display: none;
    }
    .launch-btn {
        padding: 8px 16px;
        border-radius: 999px;
        background: linear-gradient(90deg, #4c5cff, #7b8bff);
        color: white;
        font-weight: 600;
        border: none;
        cursor: pointer;
        font-size: 14px;
    }

    @media (min-width: 700px) {
        .nav-links {
            display: flex;
            gap: 18px;
            color: #cdd9ff;
        }
        .nav-links span:hover {
            color: #fff;
        }
    }

    /* HERO */
    .hero {
        padding-top: 110px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    /* STARS */
    .stars {
        position: absolute;
        inset: 0;
        z-index: -1;
        background-image:
            radial-gradient(#ffffff 1px, transparent 1px),
            radial-gradient(#ffffff 1px, transparent 1px),
            radial-gradient(#ffffff 1px, transparent 1px);
        background-size: 180px 180px, 260px 260px, 220px 220px;
        background-position: 0 0, 60px 100px, 140px 240px;
        opacity: 0.7;
    }

    /* PLANET */
    .planet {
        font-size: 160px;
        margin-top: 20px;
    }

    /* TITLE */
    .hero-title {
        margin-top: 10px;
        font-size: 52px;
        font-weight: 800;
        color: #9bb1ff;
        text-shadow: 0 0 20px #4c5cff, 0 0 40px #4c5cff;
    }

    /* MOON SURFACE */
    .moon-surface {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 200px;
        background: linear-gradient(#bfbfbf, #9a9a9a);
        border-top-left-radius: 40px;
        border-top-right-radius: 40px;
        box-shadow: 0 -20px 40px #000 inset;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 20px;
        gap: 40px;
    }

    /* CRATERS */
    .crater {
        position: absolute;
        bottom: 40px;
        width: 80px;
        height: 30px;
        background: radial-gradient(circle, #7a7a7a, #5a5a5a);
        border-radius: 50%;
        opacity: 0.4;
    }
    .crater.c1 { left: 20%; }
    .crater.c2 { left: 50%; }
    .crater.c3 { left: 75%; }

    /* ASTRONAUT */
    .astronaut {
        font-size: 100px;
        position: relative;
    }

    /* SPEECH BUBBLE */
    .speech {
        position: absolute;
        top: -120px;
        left: -40px;
        width: 260px;
        background: rgba(5, 8, 20, 0.9);
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #4c5cff;
        font-size: 14px;
        text-align: left;
    }
    .speech::after {
        content: "";
        position: absolute;
        bottom: -10px;
        left: 40px;
        width: 18px;
        height: 18px;
        background: rgba(5, 8, 20, 0.9);
        border-left: 1px solid #4c5cff;
        border-bottom: 1px solid #4c5cff;
        transform: rotate(45deg);
    }

    /* LAB DESK */
    .lab {
        background: #1b1f3a;
        padding: 14px 20px;
        border-radius: 12px;
        border: 2px solid #4c5cff;
        text-align: center;
        font-size: 20px;
        color: #9bb1ff;
        box-shadow: 0 0 20px #4c5cff55;
    }
    .lab-items {
        font-size: 30px;
        margin-top: 6px;
    }

    /* ROCKET */
    .rocket {
        font-size: 110px;
    }

</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">Stellar Lab</div>
    <div class="nav-links">
        <span>Home</span>
        <span>Exhibits</span>
        <span>Experiments</span>
        <span>Atlas</span>
        <span>Community</span>
        <span>About</span>
    </div>
    <button class="launch-btn">Launch Lab</button>
</header>

<!-- HERO -->
<section class="hero">

    <div class="stars"></div>

    <div class="planet">🪐</div>

    <div class="hero-title">Stellar Lab</div>

</section>

<!-- MOON SURFACE SCENE -->
<div class="moon-surface">

    <div class="crater c1"></div>
    <div class="crater c2"></div>
    <div class="crater c3"></div>

    <!-- Astronaut -->
    <div class="astronaut">
        🧑‍🚀
        <div class="speech">
            Hello!! Welcome to Stellar Lab!! 🧪<br>
            Let’s explore space together 🌌🚀!!
        </div>
    </div>

    <!-- Lab Desk -->
    <div class="lab">
        Stellar Lab
        <div class="lab-items">🧪🔬⚗️🧫</div>
    </div>

    <!-- Rocket -->
    <div class="rocket">🚀</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explore the Universe</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: Inter, system-ui, -apple-system, sans-serif;
    background: #020617;
    color: #e5e7eb;
}

/* FULLSCREEN SKY */
#skyCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: block;
}

/* TOP BAR */
#topBar {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 20;
    text-align: center;
}

#topBar h1 {
    margin: 0;
    font-size: 24px;
    color: #f9fafb;
    text-shadow: 0 0 10px rgba(0,0,0,0.7);
}

#topBar p {
    margin: 4px 0 10px;
    font-size: 13px;
    opacity: 0.9;
}

/* MODE BUTTONS */
#modeButtons {
    display: flex;
    gap: 8px;
    justify-content: center;
}

button {
    margin: 0;
    padding: 7px 13px;
    border-radius: 999px;
    border: 1px solid #4b5563;
    background: rgba(15,23,42,0.9);
    color: #e5e7eb;
    cursor: pointer;
    font-size: 12px;
    backdrop-filter: blur(8px);
}
button.active {
    border-color: #22c55e;
    color: #f9fafb;
}

/* MOON HOME BUTTON */
.moon-home {
    position: fixed;
    left: 12px;
    top: 12px;
    width: 70px;
    height: 70px;
    background: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg') center/cover no-repeat;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 13px;
    color: white;
    text-decoration: none;
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: 0 0 20px rgba(0,0,0,0.9);
    z-index: 30;
}

/* LOCATION TEXT */
#locationText {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    opacity: 0.85;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
    z-index: 15;
}

/* SLIDE-UP INFO PANEL */
#infoPanel {
    position: fixed;
    left: 0;
    right: 0;
    bottom: -240px;
    height: 240px;
    background: rgba(15,23,42,0.96);
    border-top: 1px solid #1f2937;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.7);
    padding: 16px 20px;
    font-size: 14px;
    line-height: 1.6;
    z-index: 25;
    transition: bottom 0.35s ease;
    backdrop-filter: blur(12px);
}

#infoPanel.visible {
    bottom: 0;
}

#infoTitle {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
}

#infoBody {
    font-size: 14px;
    opacity: 0.9;
}

#infoHint {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
}

/* LIFE LIST */
#lifeList {
    position: fixed;
    right: 10px;
    top: 110px;
    width: 260px;
    max-height: 60vh;
    overflow-y: auto;
    background: rgba(15,23,42,0.9);
    border-radius: 12px;
    border: 1px solid #1f2937;
    padding: 10px;
    display: none;
    z-index: 22;
    backdrop-filter: blur(10px);
}

.life-card {
    background: #020617;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1px solid #1f2937;
    cursor: pointer;
}
.life-card:hover {
    border-color: #22c55e;
}
.life-name {
    font-weight: 600;
    font-size: 14px;
}
.life-meta {
    font-size: 12px;
    opacity: 0.8;
}
</style>
</head>

<body>

<a class="moon-home" href="../experiment.html">Lab</a>

<div id="topBar">
    <h1>Explore the Universe</h1>
    <p>Real sky, real objects, tap to learn.</p>
    <div id="modeButtons">
        <button id="skyBtn" class="active">Sky</button>
        <button id="planetsBtn">Planets</button>
        <button id="lifeBtn">Life</button>
    </div>
</div>

<canvas id="skyCanvas"></canvas>

<div id="locationText">Detecting your location and time…</div>

<div id="infoPanel">
    <div id="infoTitle">Tap an object in the sky</div>
    <div id="infoBody">
        Once the catalogs load, you can tap stars, planets, moons, and nebulae to see their information here.
    </div>
    <div id="infoHint">Sky mode uses your location and time to show the real sky.</div>
</div>

<div id="lifeList"></div>

<script>
const canvas = document.getElementById("skyCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const skyBtn = document.getElementById("skyBtn");
const planetsBtn = document.getElementById("planetsBtn");
const lifeBtn = document.getElementById("lifeBtn");
const infoPanel = document.getElementById("infoPanel");
const infoTitle = document.getElementById("infoTitle");
const infoBody = document.getElementById("infoBody");
const infoHint = document.getElementById("infoHint");
const locationText = document.getElementById("locationText");
const lifeList = document.getElementById("lifeList");

let mode = "sky";
let t = 0;

/* Gyroscope state */
let useGyro = true;
let alpha = 0;
let beta = 0;
let gamma = 0;

/* Location/time */
let userLat = 0;
let userLon = 0;
let hasLocation = false;

/* Catalogs */
let starCatalog = [];
let planetCatalog = [];
let moonCatalog = [];
let dsoCatalog = [];

/* Rendered objects for tap detection */
let renderedObjects = [];

/* THEMES */
const themes = {
    day: {
        name: "day",
        top: [122, 184, 255],
        mid: [188, 217, 255],
        bottom: [232, 242, 255],
        starOpacity: 0.3
    },
    sunrise: {
        name: "sunrise",
        top: [255, 179, 107],
        mid: [255, 223, 194],
        bottom: [200, 217, 255],
        starOpacity: 0.5
    },
    sunset: {
        name: "sunset",
        top: [255, 138, 92],
        mid: [255, 191, 161],
        bottom: [184, 201, 255],
        starOpacity: 0.6
    },
    night: {
        name: "night",
        top: [26, 11, 61],
        mid: [10, 6, 30],
        bottom: [2, 6, 23],
        starOpacity: 1.0
    }
};

let currentTheme = themes.night;
let targetTheme = themes.night;
let themeProgress = 1;

function lerp(a, b, p) { return a + (b - a) * p; }
function lerpColor(c1, c2, p) {
    return [
        Math.round(lerp(c1[0], c2[0], p)),
        Math.round(lerp(c1[1], c2[1], p)),
        Math.round(lerp(c1[2], c2[2], p))
    ];
}
function rgbToStr(c) { return `rgb(${c[0]}, ${c[1]}, ${c[2]})`; }

/* LOCATION + TIME */
function initLocation() {
    const now = new Date();
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "Unknown time zone";
    const timeStr = now.toLocaleString();
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            userLat = latitude;
            userLon = longitude;
            hasLocation = true;
            locationText.textContent =
                `Location: lat ${latitude.toFixed(2)}, lon ${longitude.toFixed(2)} • Time: ${timeStr} (${tz})`;
        }, () => {
            hasLocation = false;
            locationText.textContent =
                `Location: device time zone (${tz}) • Time: ${timeStr}`;
        });
    } else {
        hasLocation = false;
        locationText.textContent =
            `Location: device time zone (${tz}) • Time: ${timeStr}`;
    }
}

/* TIME-BASED THEME */
function getTimeTheme() {
    const now = new Date();
    const hour = now.getHours() + now.getMinutes() / 60;

    if (hour >= 7 && hour < 17) return themes.day;
    else if (hour >= 5 && hour < 7) return themes.sunrise;
    else if (hour >= 17 && hour < 20.5) return themes.sunset;
    else return themes.night;
}

function updateThemeTarget() {
    const newTheme = getTimeTheme();
    if (newTheme.name !== targetTheme.name) {
        targetTheme = newTheme;
        themeProgress = 0;
    }
}

/* BACKGROUND */
function drawBackground() {
    if (themeProgress < 1) {
        themeProgress += 0.002;
        if (themeProgress > 1) themeProgress = 1;
    }

    const top = lerpColor(currentTheme.top, targetTheme.top, themeProgress);
    const mid = lerpColor(currentTheme.mid, targetTheme.mid, themeProgress);
    const bottom = lerpColor(currentTheme.bottom, targetTheme.bottom, themeProgress);
    const starOpacity = lerp(currentTheme.starOpacity, targetTheme.starOpacity, themeProgress);

    if (themeProgress === 1) currentTheme = targetTheme;

    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, rgbToStr(top));
    grad.addColorStop(0.5, rgbToStr(mid));
    grad.addColorStop(1, rgbToStr(bottom));

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.height);

    ctx.save();
    ctx.fillStyle = `rgba(148,163,184,${starOpacity})`;
    for (let i = 0; i < 220; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const r = Math.random() * 1.8;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

/* ASTRONOMY MATH (simplified) */
function deg2rad(d) { return d * Math.PI / 180; }
function rad2deg(r) { return r * 180 / Math.PI; }

function getLocalSiderealTime(date, lonDeg) {
    const JD = (date.getTime() / 86400000) + 2440587.5;
    const D = JD - 2451545.0;
    let GMST = 18.697374558 + 24.06570982441908 * D;
    GMST = ((GMST % 24) + 24) % 24;
    const LST = GMST + lonDeg / 15;
    return ((LST % 24) + 24) % 24;
}

function raDecToAltAz(raDeg, decDeg, latDeg, lonDeg, date) {
    const LST = getLocalSiderealTime(date, lonDeg);
    const HA = (LST * 15) - raDeg;

    const ha = deg2rad(HA);
    const dec = deg2rad(decDeg);
    const lat = deg2rad(latDeg);

    const sinAlt = Math.sin(dec) * Math.sin(lat) + Math.cos(dec) * Math.cos(lat) * Math.cos(ha);
    const alt = Math.asin(sinAlt);

    const cosAz = (Math.sin(dec) - Math.sin(alt) * Math.sin(lat)) / (Math.cos(alt) * Math.cos(lat));
    let az = Math.acos(cosAz);

    if (Math.sin(ha) > 0) {
        az = 2 * Math.PI - az;
    }

    return {
        altDeg: rad2deg(alt),
        azDeg: rad2deg(az)
    };
}

function altAzToScreen(altDeg, azDeg) {
    const altNorm = altDeg / 90;
    const azRad = deg2rad(azDeg);

    const cx = 0.5;
    const cy = 0.6;

    const radius = 0.45 * altNorm;

    const x = cx + radius * Math.sin(azRad);
    const y = cy - radius * Math.cos(azRad);

    return { x, y };
}

function applyGyroToScreen(xNorm, yNorm) {
    if (!useGyro) return { x: xNorm, y: yNorm };

    const yaw = alpha * Math.PI / 180;
    const pitch = beta * Math.PI / 180;

    const cx = 0.5;
    const cy = 0.5;
    let dx = xNorm - cx;
    let dy = yNorm - cy;

    const cosY = Math.cos(yaw);
    const sinY = Math.sin(yaw);
    const cosP = Math.cos(pitch);
    const sinP = Math.sin(pitch);

    let rx = dx * cosY - dy * sinY;
    let ry = dx * sinY + dy * cosY;

    ry = ry * cosP - 0.3 * sinP;

    return { x: cx + rx, y: cy + ry };
}

/* DRAW SKY MODE */
function drawSky() {
    drawBackground();
    renderedObjects = [];

    const now = new Date();
    const lat = hasLocation ? userLat : 48.0;
    const lon = hasLocation ? userLon : 11.5;

    /* Stars */
    for (const star of starCatalog) {
        const { altDeg, azDeg } = raDecToAltAz(star.ra, star.dec, lat, lon, now);
        if (altDeg <= 0) continue;

        const proj = altAzToScreen(altDeg, azDeg);
        const rotated = applyGyroToScreen(proj.x, proj.y);
        const x = rotated.x * canvas.width;
        const y = rotated.y * canvas.height;

        const mag = star.mag ?? 3.0;
        const r = Math.max(1, 6 - mag);

        let color = "#f9fafb";
        if (star.spectral) {
            const s = star.spectral[0];
            if (s === "O" || s === "B") color = "#93c5fd";
            else if (s === "A") color = "#bfdbfe";
            else if (s === "F") color = "#fee2e2";
            else if (s === "G") color = "#fde68a";
            else if (s === "K") color = "#fdba74";
            else if (s === "M") color = "#f97316";
        }

        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

        renderedObjects.push({
            type: "star",
            name: star.name,
            x, y, r,
            data: star
        });
    }

    /* Planets */
    for (const planet of planetCatalog) {
        if (!planet.ra || !planet.dec) continue;
        const { altDeg, azDeg } = raDecToAltAz(planet.ra, planet.dec, lat, lon, now);
        if (altDeg <= 0) continue;

        const proj = altAzToScreen(altDeg, azDeg);
        const rotated = applyGyroToScreen(proj.x, proj.y);
        const x = rotated.x * canvas.width;
        const y = rotated.y * canvas.height;

        const r = planet.size || 10;
        let color = planet.color || "#facc15";

        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

        renderedObjects.push({
            type: "planet",
            name: planet.name,
            x, y, r,
            data: planet
        });
    }

    /* Moons */
    for (const moon of moonCatalog) {
        if (!moon.ra || !moon.dec) continue;
        const { altDeg, azDeg } = raDecToAltAz(moon.ra, moon.dec, lat, lon, now);
        if (altDeg <= 0) continue;

        const proj = altAzToScreen(altDeg, azDeg);
        const rotated = applyGyroToScreen(proj.x, proj.y);
        const x = rotated.x * canvas.width;
        const y = rotated.y * canvas.height;

        const r = moon.size || 6;
        ctx.fillStyle = moon.color || "#e5e7eb";
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

        renderedObjects.push({
            type: "moon",
            name: moon.name,
            x, y, r,
            data: moon
        });
    }

    /* DSOs */
    for (const dso of dsoCatalog) {
        const { altDeg, azDeg } = raDecToAltAz(dso.ra, dso.dec, lat, lon, now);
        if (altDeg <= 0) continue;

        const proj = altAzToScreen(altDeg, azDeg);
        const rotated = applyGyroToScreen(proj.x, proj.y);
        const x = rotated.x * canvas.width;
        const y = rotated.y * canvas.height;

        const r = (dso.size || 30) / 200;
        const radiusPx = r * canvas.width;

        ctx.fillStyle = "rgba(147,197,253,0.6)";
        ctx.beginPath();
        ctx.arc(x, y, radiusPx, 0, Math.PI * 2);
        ctx.fill();

        renderedObjects.push({
            type: "dso",
            name: dso.name,
            x, y, r: radiusPx,
            data: dso
        });
    }

    infoTitle.textContent = "Sky Mode";
    infoBody.innerHTML = "Real sky based on your location and time. Tap stars, planets, moons, and nebulae to see their information.";
    infoHint.textContent = "Catalogs: stars-part1.json, stars-part2.json, planets.json, moons.json, dsos.json.";
}

/* PLANETS MODE */
function drawPlanetsMode() {
    drawBackground();
    renderedObjects = [];

    const cx = canvas.width * 0.5;
    const cy = canvas.height * 0.5;

    ctx.save();
    ctx.strokeStyle = "rgba(148,163,184,0.4)";
    ctx.lineWidth = 1.5;
    for (let i = 1; i <= 6; i++) {
        ctx.beginPath();
        ctx.arc(cx, cy, 90 + i * 45, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.restore();

    for (const planet of planetCatalog) {
        const idx = planet.index ?? 1;
        const angle = (t * 0.05 * (idx + 1)) % (Math.PI * 2);
        const radius = 90 + idx * 45;

        const x = cx + radius * Math.cos(angle);
        const y = cy + radius * Math.sin(angle);
        const r = planet.size || 14;

        ctx.fillStyle = planet.color || "#facc15";
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

        renderedObjects.push({
            type: "planet",
            name: planet.name,
            x, y, r,
            data: planet
        });
    }

    infoTitle.textContent = "Planets Mode";
    infoBody.innerHTML = "Simplified solar system view. Tap a planet to see its details.";
    infoHint.textContent = "Real ephemeris math can refine positions later.";
}

/* LIFE MODE */
const lifeWorlds = [
    {
        name: "TRAPPIST-1e",
        star: "TRAPPIST-1",
        distance: "39 ly",
        temp: "≈ 250 K",
        water: "High probability",
        habitability: "Very promising",
        description: "Earth-sized world in the habitable zone of a cool red dwarf."
    },
    {
        name: "Kepler-186f",
        star: "Kepler-186",
        distance: "≈ 500 ly",
        temp: "Cool, Earth-sized",
        water: "Possible",
        habitability: "Moderate",
        description: "First Earth-sized planet found in the habitable zone of another star."
    },
    {
        name: "Proxima Centauri b",
        star: "Proxima Centauri",
        distance: "4.24 ly",
        temp: "Temperate",
        water: "Unknown",
        habitability: "Uncertain",
        description: "Closest known exoplanet, orbiting the nearest star to the Sun."
    }
];

function drawLifeMode() {
    drawBackground();
    renderedObjects = [];

    lifeList.style.display = "block";
    lifeList.innerHTML = "";

    lifeWorlds.forEach(world => {
        const card = document.createElement("div");
        card.className = "life-card";
        card.innerHTML = `
            <div class="life-name">${world.name}</div>
            <div class="life-meta">${world.star} • ${world.distance} • Habitability: ${world.habitability}</div>
            <div class="life-meta">Water: ${world.water} • Temperature: ${world.temp}</div>
        `;
        card.onclick = () => {
            infoTitle.textContent = world.name;
            infoBody.innerHTML = `
                Star: ${world.star}<br>
                Distance: ${world.distance}<br>
                Temperature: ${world.temp}<br>
                Water: ${world.water}<br>
                Habitability: ${world.habitability}<br><br>
                ${world.description}
            `;
            infoHint.textContent = "These are real exoplanets discovered by astronomers.";
            infoPanel.classList.add("visible");
        };
        lifeList.appendChild(card);
    });

    infoTitle.textContent = "Life Mode";
    infoBody.innerHTML = "Explore real exoplanets where life might exist. Tap a world in the list to see its details.";
    infoHint.textContent = "Later you can connect this to more detailed habitability models.";
}

/* MODE SWITCHING */
function setMode(newMode) {
    mode = newMode;
    skyBtn.classList.toggle("active", mode === "sky");
    planetsBtn.classList.toggle("active", mode === "planets");
    lifeBtn.classList.toggle("active", mode === "life");

    if (mode === "life") {
        lifeList.style.display = "block";
        drawLifeMode();
    } else {
        lifeList.style.display = "none";
        if (mode === "sky") drawSky();
        if (mode === "planets") drawPlanetsMode();
    }
    infoPanel.classList.remove("visible");
}

skyBtn.onclick = () => setMode("sky");
planetsBtn.onclick = () => setMode("planets");
lifeBtn.onclick = () => setMode("life");

/* TAP HANDLING */
canvas.addEventListener("click", (e) => {
    if (mode === "life") return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    let hit = null;
    let bestDist = Infinity;

    for (const obj of renderedObjects) {
        const dx = x - obj.x;
        const dy = y - obj.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist <= obj.r + 8 && dist < bestDist) {
            bestDist = dist;
            hit = obj;
        }
    }

    if (hit) {
        const d = hit.data;
        infoTitle.textContent = `${hit.name} (${hit.type.toUpperCase()})`;

        let bodyHtml = "";

        if (hit.type === "star") {
            bodyHtml = `
                Magnitude: ${d.mag ?? "?"}<br>
                Spectral type: ${d.spectral ?? "?"}<br>
                Constellation: ${d.constellation ?? "?"}<br>
            `;
        } else if (hit.type === "planet") {
            bodyHtml = `
                Type: ${d.type ?? "Planet"}<br>
                Orbit: ${d.orbit ?? "?"}<br>
                Radius: ${d.radius ?? "?"}<br>
                Description: ${d.description ?? "No description yet."}<br>
            `;
        } else if (hit.type === "moon") {
            bodyHtml = `
                Host planet: ${d.host ?? "?"}<br>
                Radius: ${d.radius ?? "?"}<br>
                Description: ${d.description ?? "No description yet."}<br>
            `;
        } else if (hit.type === "dso") {
            bodyHtml = `
                Type: ${d.type ?? "Deep-sky object"}<br>
                Magnitude: ${d.mag ?? "?"}<br>
                Size: ${d.size ?? "?"} arcmin<br>
                Description: ${d.description ?? "No description yet."}<br>
            `;
        }

        infoBody.innerHTML = bodyHtml;
        infoHint.textContent = "Tap another object to explore more of the sky.";
        infoPanel.classList.add("visible");
    } else {
        infoPanel.classList.remove("visible");
    }
});

/* GYROSCOPE / DEVICE ORIENTATION */
if (window.DeviceOrientationEvent) {
    window.addEventListener("deviceorientation", (event) => {
        alpha = event.alpha || 0;
        beta = event.beta || 0;
        gamma = event.gamma || 0;
    });
}

/* LOAD CATALOGS */
async function loadCatalogs() {
    try {
        const starFiles = [
            "stars-part1.json",
            "stars-part2.json"
        ];

        starCatalog = [];

        for (const file of starFiles) {
            const data = await fetch(file).then(r => r.json());
            starCatalog.push(...data);
        }

        const [planets, moons, dsos] = await Promise.all([
            fetch("planets.json").then(r => r.json()),
            fetch("moons.json").then(r => r.json()),
            fetch("dsos.json").then(r => r.json())
        ]);

        planetCatalog = planets;
        moonCatalog = moons;
        dsoCatalog = dsos;

        infoHint.textContent = "Hipparcos catalog loaded. Tap stars, planets, moons, and nebulae to explore.";
    } catch (err) {
        console.error("Error loading catalogs:", err);
        infoHint.textContent = "Error loading catalogs. Check your JSON files.";
    }
}

/* ANIMATION LOOP */
function animate() {
    t += 0.01;
    updateThemeTarget();

    if (mode === "sky") drawSky();
    else if (mode === "planets") drawPlanetsMode();
    else if (mode === "life") drawLifeMode();

    requestAnimationFrame(animate);
}

/* INIT */

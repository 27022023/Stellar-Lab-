 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explore the Universe (WebGL)</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: Inter, system-ui, -apple-system, sans-serif;
    background: #020617;
    color: #e5e7eb;
}
#glCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: block;
}
#topBar {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 20;
    text-align: center;
}
#topBar h1 {
    margin: 0;
    font-size: 24px;
    color: #f9fafb;
    text-shadow: 0 0 10px rgba(0,0,0,0.7);
}
#topBar p {
    margin: 4px 0 10px;
    font-size: 13px;
    opacity: 0.9;
}
#modeButtons {
    display: flex;
    gap: 8px;
    justify-content: center;
}
button {
    margin: 0;
    padding: 7px 13px;
    border-radius: 999px;
    border: 1px solid #4b5563;
    background: rgba(15,23,42,0.9);
    color: #e5e7eb;
    cursor: pointer;
    font-size: 12px;
    backdrop-filter: blur(8px);
}
button.active {
    border-color: #22c55e;
    color: #f9fafb;
}
.moon-home {
    position: fixed;
    left: 12px;
    top: 12px;
    width: 70px;
    height: 70px;
    background: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg') center/cover no-repeat;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 13px;
    color: white;
    text-decoration: none;
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: 0 0 20px rgba(0,0,0,0.9);
    z-index: 30;
}
#locationText {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    opacity: 0.85;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
    z-index: 15;
}
#infoPanel {
    position: fixed;
    left: 0;
    right: 0;
    bottom: -240px;
    height: 240px;
    background: rgba(15,23,42,0.96);
    border-top: 1px solid #1f2937;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.7);
    padding: 16px 20px;
    font-size: 14px;
    line-height: 1.6;
    z-index: 25;
    transition: bottom 0.35s ease;
    backdrop-filter: blur(12px);
}
#infoPanel.visible {
    bottom: 0;
}
#infoTitle {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
}
#infoBody {
    font-size: 14px;
    opacity: 0.9;
}
#infoHint {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
}
#lifeList {
    position: fixed;
    right: 10px;
    top: 110px;
    width: 260px;
    max-height: 60vh;
    overflow-y: auto;
    background: rgba(15,23,42,0.9);
    border-radius: 12px;
    border: 1px solid #1f2937;
    padding: 10px;
    display: none;
    z-index: 22;
    backdrop-filter: blur(10px);
}
.life-card {
    background: #020617;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1px solid #1f2937;
    cursor: pointer;
}
.life-card:hover {
    border-color: #22c55e;
}
.life-name {
    font-weight: 600;
    font-size: 14px;
}
.life-meta {
    font-size: 12px;
    opacity: 0.8;
}
</style>
</head>
<body>

<a class="moon-home" href="../experiment.html">Lab</a>

<div id="topBar">
    <h1>Explore the Universe</h1>
    <p>WebGL sky, real objects, tap to learn.</p>
    <div id="modeButtons">
        <button id="skyBtn" class="active">Sky</button>
        <button id="planetsBtn">Planets</button>
        <button id="lifeBtn">Life</button>
    </div>
</div>

<canvas id="glCanvas"></canvas>

<div id="locationText">Detecting your location and time…</div>

<div id="infoPanel">
    <div id="infoTitle">Tap an object in the sky</div>
    <div id="infoBody">
        WebGL sky is active. Stars, planets, moons, and nebulae can be tapped to show info here.
    </div>
    <div id="infoHint">Sky mode uses your location and time to show the real sky.</div>
</div>

<div id="lifeList"></div>

<script>
const canvas = document.getElementById("glCanvas");
const gl = canvas.getContext("webgl");
const skyBtn = document.getElementById("skyBtn");
const planetsBtn = document.getElementById("planetsBtn");
const lifeBtn = document.getElementById("lifeBtn");
const infoPanel = document.getElementById("infoPanel");
const infoTitle = document.getElementById("infoTitle");
const infoBody = document.getElementById("infoBody");
const infoHint = document.getElementById("infoHint");
const locationText = document.getElementById("locationText");
const lifeList = document.getElementById("lifeList");

let mode = "sky";
let t = 0;
let userLat = 48.0;
let userLon = 11.5;
let hasLocation = false;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

/* Simple location/time */
function initLocation() {
    const now = new Date();
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "Unknown time zone";
    const timeStr = now.toLocaleString();
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            userLat = latitude;
            userLon = longitude;
            hasLocation = true;
            locationText.textContent =
                `Location: lat ${latitude.toFixed(2)}, lon ${longitude.toFixed(2)} • Time: ${timeStr} (${tz})`;
        }, () => {
            hasLocation = false;
            locationText.textContent =
                `Location: device time zone (${tz}) • Time: ${timeStr}`;
        });
    } else {
        hasLocation = false;
        locationText.textContent =
            `Location: device time zone (${tz}) • Time: ${timeStr}`;
    }
}

/* WebGL shaders for stars */
const vsSource = `
attribute vec2 aPosition;
attribute float aBrightness;
uniform vec2 uResolution;
uniform float uPointSize;
varying float vBrightness;
void main() {
    vec2 zeroToOne = aPosition / uResolution;
    vec2 clipSpace = zeroToOne * 2.0 - 1.0;
    gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
    gl_PointSize = uPointSize * aBrightness;
    vBrightness = aBrightness;
}
`;

const fsSource = `
precision mediump float;
varying float vBrightness;
void main() {
    float d = distance(gl_PointCoord, vec2(0.5, 0.5));
    float alpha = smoothstep(0.5, 0.0, d) * vBrightness;
    gl_FragColor = vec4(1.0, 1.0, 1.0, alpha);
}
`;

function createShader(gl, type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    return shader;
}
function createProgram(gl, vsSource, fsSource) {
    const vs = createShader(gl, gl.VERTEX_SHADER, vsSource);
    const fs = createShader(gl, gl.FRAGMENT_SHADER, fsSource);
    const program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    return program;
}

const program = createProgram(gl, vsSource, fsSource);
gl.useProgram(program);

const positionLoc = gl.getAttribLocation(program, "aPosition");
const brightnessLoc = gl.getAttribLocation(program, "aBrightness");
const resolutionLoc = gl.getUniformLocation(program, "uResolution");
const pointSizeLoc = gl.getUniformLocation(program, "uPointSize");

/* Star data (placeholder: 2000 stars, you can replace with real catalog later) */
const starCount = 2000;
const starPositions = new Float32Array(starCount * 2);
const starBrightness = new Float32Array(starCount);

for (let i = 0; i < starCount; i++) {
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;
    const b = 0.4 + Math.random() * 0.6;
    starPositions[i * 2] = x;
    starPositions[i * 2 + 1] = y;
    starBrightness[i] = b;
}

/* Buffers */
const positionBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
gl.bufferData(gl.ARRAY_BUFFER, starPositions, gl.STATIC_DRAW);

const brightnessBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, brightnessBuffer);
gl.bufferData(gl.ARRAY_BUFFER, starBrightness, gl.STATIC_DRAW);

/* Planets, moons, DSOs (simple sample data) */
const planets = [
    { name: "Mercury", radius: 8, color: "#e5e7eb", orbit: 60 },
    { name: "Venus", radius: 10, color: "#fbbf24", orbit: 90 },
    { name: "Earth", radius: 11, color: "#22c55e", orbit: 120 },
    { name: "Mars", radius: 9, color: "#f97316", orbit: 150 },
    { name: "Jupiter", radius: 16, color: "#facc15", orbit: 190 },
    { name: "Saturn", radius: 14, color: "#fde68a", orbit: 230 }
];

const moons = [
    { name: "Moon", host: "Earth", radius: 5, orbit: 20 },
    { name: "Phobos", host: "Mars", radius: 3, orbit: 12 },
    { name: "Deimos", host: "Mars", radius: 2, orbit: 18 }
];

const dsos = [
    { name: "Orion Nebula", type: "Nebula", size: 40, x: 0.3, y: 0.4 },
    { name: "Andromeda Galaxy", type: "Galaxy", size: 50, x: 0.7, y: 0.3 },
    { name: "Pleiades", type: "Cluster", size: 35, x: 0.5, y: 0.2 }
];

const lifeWorlds = [
    {
        name: "TRAPPIST-1e",
        star: "TRAPPIST-1",
        distance: "39 ly",
        temp: "≈ 250 K",
        water: "High probability",
        habitability: "Very promising",
        description: "Earth-sized world in the habitable zone of a cool red dwarf."
    },
    {
        name: "Kepler-186f",
        star: "Kepler-186",
        distance: "≈ 500 ly",
        temp: "Cool, Earth-sized",
        water: "Possible",
        habitability: "Moderate",
        description: "First Earth-sized planet found in the habitable zone of another star."
    },
    {
        name: "Proxima Centauri b",
        star: "Proxima Centauri",
        distance: "4.24 ly",
        temp: "Temperate",
        water: "Unknown",
        habitability: "Uncertain",
        description: "Closest known exoplanet, orbiting the nearest star to the Sun."
    }
];

/* Rendered objects for hit detection (planets/moons/dsos) */
let renderedObjects = [];

/* Draw sky (WebGL stars + 2D overlay for planets/moons/dsos) */
const ctx2d = canvas.getContext("2d"); // reuse canvas for overlay

function drawSky() {
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0.01, 0.02, 0.07, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT);

    gl.useProgram(program);
    gl.uniform2f(resolutionLoc, canvas.width, canvas.height);
    gl.uniform1f(pointSizeLoc, 3.0);

    gl.enableVertexAttribArray(positionLoc);
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    gl.vertexAttribPointer(positionLoc, 2, gl.FLOAT, false, 0, 0);

    gl.enableVertexAttribArray(brightnessLoc);
    gl.bindBuffer(gl.ARRAY_BUFFER, brightnessBuffer);
    gl.vertexAttribPointer(brightnessLoc, 1, gl.FLOAT, false, 0, 0);

    gl.drawArrays(gl.POINTS, 0, starCount);

    renderedObjects = [];
    ctx2d.clearRect(0, 0, canvas.width, canvas.height);

    /* Planets */
    const cx = canvas.width * 0.5;
    const cy = canvas.height * 0.6;
    ctx2d.save();
    ctx2d.strokeStyle = "rgba(148,163,184,0.4)";
    ctx2d.lineWidth = 1.2;
    for (let i = 0; i < planets.length; i++) {
        ctx2d.beginPath();
        ctx2d.arc(cx, cy, planets[i].orbit, 0, Math.PI * 2);
        ctx2d.stroke();
    }
    ctx2d.restore();

    for (let i = 0; i < planets.length; i++) {
        const p = planets[i];
        const angle = t * 0.3 + i;
        const x = cx + p.orbit * Math.cos(angle);
        const y = cy + p.orbit * Math.sin(angle);

        ctx2d.fillStyle = p.color;
        ctx2d.beginPath();
        ctx2d.arc(x, y, p.radius, 0, Math.PI * 2);
        ctx2d.fill();

        renderedObjects.push({
            type: "planet",
            name: p.name,
            x, y, r: p.radius,
            data: p
        });
    }

    /* Moons */
    for (let i = 0; i < moons.length; i++) {
        const m = moons[i];
        const host = planets.find(p => p.name === m.host);
        if (!host) continue;
        const angle = t * 0.8 + i * 1.5;
        const hx = cx + host.orbit * Math.cos(angle);
        const hy = cy + host.orbit * Math.sin(angle);
        const x = hx + m.orbit * Math.cos(angle * 2);
        const y = hy + m.orbit * Math.sin(angle * 2);

        ctx2d.fillStyle = "#e5e7eb";
        ctx2d.beginPath();
        ctx2d.arc(x, y, m.radius, 0, Math.PI * 2);
        ctx2d.fill();

        renderedObjects.push({
            type: "moon",
            name: m.name,
            x, y, r: m.radius,
            data: m
        });
    }

    /* DSOs */
    for (const d of dsos) {
        const x = d.x * canvas.width;
        const y = d.y * canvas.height;
        const r = d.size;

        ctx2d.fillStyle = "rgba(147,197,253,0.6)";
        ctx2d.beginPath();
        ctx2d.arc(x, y, r, 0, Math.PI * 2);
        ctx2d.fill();

        renderedObjects.push({
            type: "dso",
            name: d.name,
            x, y, r,
            data: d
        });
    }

    infoTitle.textContent = "Sky Mode (WebGL)";
    infoBody.innerHTML = "Stars are rendered with WebGL. Planets, moons, and deep-sky objects are overlaid. Tap them to see details.";
    infoHint.textContent = "This version can be extended to real catalogs (Hipparcos, Gaia) without huge JSON files.";
}

/* Planets-only mode (2D solar system view) */
function drawPlanetsMode() {
    ctx2d.clearRect(0, 0, canvas.width, canvas.height);
    renderedObjects = [];

    const cx = canvas.width * 0.5;
    const cy = canvas.height * 0.5;

    ctx2d.save();
    ctx2d.strokeStyle = "rgba(148,163,184,0.4)";
    ctx2d.lineWidth = 1.5;
    for (let i = 0; i < planets.length; i++) {
        ctx2d.beginPath();
        ctx2d.arc(cx, cy, planets[i].orbit, 0, Math.PI * 2);
        ctx2d.stroke();
    }
    ctx2d.restore();

    for (let i = 0; i < planets.length; i++) {
        const p = planets[i];
        const angle = t * 0.3 + i;
        const x = cx + p.orbit * Math.cos(angle);
        const y = cy + p.orbit * Math.sin(angle);

        ctx2d.fillStyle = p.color;
        ctx2d.beginPath();
        ctx2d.arc(x, y, p.radius, 0, Math.PI * 2);
        ctx2d.fill();

        renderedObjects.push({
            type: "planet",
            name: p.name,
            x, y, r: p.radius,
            data: p
        });
    }

    infoTitle.textContent = "Planets Mode";
    infoBody.innerHTML = "Simplified solar system view. Tap a planet to see its details.";
    infoHint.textContent = "You can later plug in real ephemeris data for accurate positions.";
}

/* Life mode */
function drawLifeMode() {
    ctx2d.clearRect(0, 0, canvas.width, canvas.height);
    renderedObjects = [];
    lifeList.style.display = "block";
    lifeList.innerHTML = "";

    lifeWorlds.forEach(world => {
        const card = document.createElement("div");
        card.className = "life-card";
        card.innerHTML = `
            <div class="life-name">${world.name}</div>
            <div class="life-meta">${world.star} • ${world.distance} • Habitability: ${world.habitability}</div>
            <div class="life-meta">Water: ${world.water} • Temperature: ${world.temp}</div>
        `;
        card.onclick = () => {
            infoTitle.textContent = world.name;
            infoBody.innerHTML = `
                Star: ${world.star}<br>
                Distance: ${world.distance}<br>
                Temperature: ${world.temp}<br>
                Water: ${world.water}<br>
                Habitability: ${world.habitability}<br><br>
                ${world.description}
            `;
            infoHint.textContent = "These are real exoplanets discovered by astronomers.";
            infoPanel.classList.add("visible");
        };
        lifeList.appendChild(card);
    });

    infoTitle.textContent = "Life Mode";
    infoBody.innerHTML = "Explore real exoplanets where life might exist. Tap a world in the list to see its details.";
    infoHint.textContent = "Later you can connect this to more detailed habitability models.";
}

/* Mode switching */
function setMode(newMode) {
    mode = newMode;
    skyBtn.classList.toggle("active", mode === "sky");
    planetsBtn.classList.toggle("active", mode === "planets");
    lifeBtn.classList.toggle("active", mode === "life");

    if (mode === "life") {
        lifeList.style.display = "block";
        drawLifeMode();
    } else {
        lifeList.style.display = "none";
        if (mode === "sky") drawSky();
        if (mode === "planets") drawPlanetsMode();
    }
    infoPanel.classList.remove("visible");
}

skyBtn.onclick = () => setMode("sky");
planetsBtn.onclick = () => setMode("planets");
lifeBtn.onclick = () => setMode("life");

/* Tap handling */
canvas.addEventListener("click", (e) => {
    if (mode === "life") return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    let hit = null;
    let bestDist = Infinity;

    for (const obj of renderedObjects) {
        const dx = x - obj.x;
        const dy = y - obj.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist <= obj.r + 8 && dist < bestDist) {
            bestDist = dist;
            hit = obj;
        }
    }

    if (hit) {
        const d = hit.data;
        infoTitle.textContent = `${hit.name} (${hit.type.toUpperCase()})`;

        let bodyHtml = "";

        if (hit.type === "planet") {
            bodyHtml = `
                Type: Planet<br>
                Orbit radius: ${d.orbit ?? "?"} px<br>
                Radius: ${d.radius ?? "?"} px<br>
            `;
        } else if (hit.type === "moon") {
            bodyHtml = `
                Host planet: ${d.host ?? "?"}<br>
                Orbit radius: ${d.orbit ?? "?"} px<br>
                Radius: ${d.radius ?? "?"} px<br>
            `;
        } else if (hit.type === "dso") {
            bodyHtml = `
                Type: ${d.type ?? "Deep-sky object"}<br>
                Size: ${d.size ?? "?"} px<br>
            `;
        }

        infoBody.innerHTML = bodyHtml;
        infoHint.textContent = "Tap another object to explore more of the sky.";
        infoPanel.classList.add("visible");
    } else {
        infoPanel.classList.remove("visible");
    }
});

/* Animation loop */
function animate() {
    t += 0.01;
    if (mode === "sky") drawSky();
    else if (mode === "planets") drawPlanetsMode();
    requestAnimationFrame(animate);
}

/* Init */
initLocation();
setMode("sky");
animate();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Atmosphere & Temperature Simulation</title>
<style>
body {
    background: #020617;
    color: #e5e7eb;
    font-family: Inter, sans-serif;
    padding: 40px;
    text-align: center;
}

h1 {
    font-size: 46px;
    margin-bottom: 8px;
    color: #f9fafb;
}

p {
    font-size: 20px;
    opacity: 0.9;
    margin-bottom: 10px;
}

canvas {
    background: #020617;
    border-radius: 20px;
    margin-top: 30px;
    box-shadow: 0 0 40px rgba(15,23,42,0.9);
}

label {
    display: block;
    margin-top: 20px;
    font-size: 20px;
}

input[type=range] {
    width: 480px;
    height: 26px;
}

#readout {
    margin-top: 30px;
    padding: 22px;
    background: #0f172a;
    border-radius: 12px;
    font-size: 22px;
    line-height: 1.6;
    border: 1px solid #1f2937;
}

#tempBar {
    height: 32px;
    width: 480px;
    background: #1e293b;
    border-radius: 20px;
    margin: 24px auto 10px auto;
    overflow: hidden;
    border: 1px solid #334155;
}

#tempFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #38bdf8, #22c55e, #facc15, #ef4444);
}

#lifeBar {
    height: 24px;
    width: 320px;
    background: #111827;
    border-radius: 16px;
    margin: 10px auto;
    overflow: hidden;
    border: 1px solid #374151;
}

#lifeFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #22c55e, #facc15, #ef4444);
}

#soundToggle {
    margin-top: 10px;
    font-size: 16px;
    cursor: pointer;
    color: #9ca3af;
}
#soundToggle span {
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid #4b5563;
}
#soundToggle span.active {
    color: #f9fafb;
    border-color: #22c55e;
}
</style>
</head>

<body>

<!-- Moon Home Button -->
<a class="moon-home" href="experiment.html">
    <img src="https://raw.githubusercontent.com/7022023/7022023.github.io/main/moon.png" 
         alt="Home" 
         style="width:70px; height:70px; border-radius:50%; position:absolute; top:20px; right:20px;">
</a>

<h1>Atmosphere & Temperature</h1>
<p>Adjust greenhouse gases and see climate, habitability, and visuals change.</p>

<div id="soundToggle">
    <span id="soundBtn">🔊 Ambient sound: OFF</span>
</div>

<label>Star Luminosity (Sun = 1)</label>
<input type="range" id="lumSlider" min="0.01" max="10" step="0.01" value="1">

<label>Distance (AU)</label>
<input type="range" id="distSlider" min="0.1" max="5" step="0.01" value="1">

<label>Albedo (Reflectivity)</label>
<input type="range" id="albedoSlider" min="0.1" max="0.9" step="0.01" value="0.3">

<label>Atmosphere Thickness</label>
<input type="range" id="atmSlider" min="0" max="1" step="0.01" value="0.5">

<label>Greenhouse Strength</label>
<input type="range" id="ghSlider" min="0" max="1" step="0.01" value="0.4">

<canvas id="planetCanvas" width="600" height="600"></canvas>

<div id="tempBar"><div id="tempFill"></div></div>

<div id="lifeBar"><div id="lifeFill"></div></div>

<div id="readout">Temperature will appear here.</div>

<script>
// Ambient sound (simple loop using Audio API, you can replace src with your own file)
let ambientAudio = null;
let soundOn = false;
const soundBtn = document.getElementById("soundBtn");
soundBtn.addEventListener("click", () => {
    if (!ambientAudio) {
        ambientAudio = new Audio("https://upload.wikimedia.org/wikipedia/commons/4/4e/Space_ambience.ogg");
        ambientAudio.loop = true;
    }
    soundOn = !soundOn;
    if (soundOn) {
        ambientAudio.play();
        soundBtn.textContent = "🔊 Ambient sound: ON";
        soundBtn.classList.add("active");
    } else {
        ambientAudio.pause();
        soundBtn.textContent = "🔊 Ambient sound: OFF";
        soundBtn.classList.remove("active");
    }
});

// Temperature model
function computeTemperature(L, d, albedo, atm, gh) {
    const Tbase = 278 * Math.sqrt(L / (d * d)) * Math.pow(1 - albedo, 0.25);
    const Tatm = Tbase * (1 + 0.25 * atm);
    const Tgh = Tatm + 35 * gh;
    return Tgh - 273.15;
}

// Climate classification
function classifyClimate(Tc) {
    if (Tc < -20) return "Snowball";
    if (Tc < 5) return "Cold but habitable";
    if (Tc < 35) return "Earth-like";
    if (Tc < 60) return "Hot but habitable";
    return "Runaway greenhouse";
}

// Planet color
function planetColor(temp) {
    if (temp < -20) return "#93c5fd";
    if (temp < 5) return "#60a5fa";
    if (temp < 35) return "#4ade80";
    if (temp < 60) return "#facc15";
    return "#ef4444";
}

// Canvas setup
const canvas = document.getElementById("planetCanvas");
const ctx = canvas.getContext("2d");
let t = 0;

// Simple noise
function noise(x, y) {
    return (Math.sin(x * 12.9898 + y * 78.233 + 43758.5453) * 43758.5453) % 1;
}

// Star background with pulsing star
function drawStars() {
    ctx.fillStyle = "#020617";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.fillStyle = "rgba(148,163,184,0.6)";
    for (let i = 0; i < 120; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const r = Math.random() * 1.5;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();

    // Pulsing central star
    const sx = canvas.width * 0.15;
    const sy = canvas.height * 0.25;
    const baseR = 40;
    const pulse = 1 + Math.sin(t * 1.5) * 0.2;
    const starGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, baseR * 3 * pulse);
    starGrad.addColorStop(0, "#ffffff");
    starGrad.addColorStop(0.3, "#fde68a");
    starGrad.addColorStop(1, "rgba(251,191,36,0)");
    ctx.fillStyle = starGrad;
    ctx.beginPath();
    ctx.arc(sx, sy, baseR * 3 * pulse, 0, Math.PI * 2);
    ctx.fill();
}

// Draw planet + orbit + effects
function drawPlanet(temp, atm, d) {
    drawStars();

    const cx = canvas.width * 0.6;
    const cy = canvas.height * 0.55;
    const radius = 150;

    // Orbit ring
    const orbitR = 80 + d * 30;
    ctx.save();
    ctx.strokeStyle = "rgba(148,163,184,0.4)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, orbitR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Atmosphere glow
    const glow = ctx.createRadialGradient(cx, cy, radius, cx, cy, radius + 140 + atm * 140);
    glow.addColorStop(0, "rgba(255,255,255,0)");
    glow.addColorStop(1, `rgba(147,197,253,${0.2 + atm * 0.8})`);
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx, cy, radius + 140 + atm * 140, 0, Math.PI * 2);
    ctx.fill();

    // Day/night shading
    ctx.save();
    const nightGrad = ctx.createRadialGradient(cx - 40, cy - 40, 0, cx, cy, radius * 1.4);
    nightGrad.addColorStop(0, "rgba(0,0,0,0.0)");
    nightGrad.addColorStop(1, "rgba(15,23,42,0.8)");
    ctx.fillStyle = nightGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, radius * 1.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Base planet
    ctx.save();
    ctx.fillStyle = planetColor(temp);
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();

    // Surface texture
    const imgData = ctx.getImageData(cx - radius, cy - radius, radius * 2, radius * 2);
    for (let y = 0; y < imgData.height; y++) {
        for (let x = 0; x < imgData.width; x++) {
            const dx = x - radius;
            const dy = y - radius;
            if (dx * dx + dy * dy <= radius * radius) {
                const idx = (y * imgData.width + x) * 4;
                const n = noise(x / 50 + t, y / 50);
                imgData.data[idx] *= 0.9 + n * 0.1;
                imgData.data[idx + 1] *= 0.9 + n * 0.1;
                imgData.data[idx + 2] *= 0.9 + n * 0.1;
            }
        }
    }
    ctx.putImageData(imgData, cx - radius, cy - radius);
    ctx.restore();

    // Clouds
    ctx.save();
    ctx.globalAlpha = 0.2 + atm * 0.6;
    ctx.fillStyle = "#e5f4ff";
    for (let i = 0; i < 12 + atm * 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r = radius * (0.6 + Math.random() * 0.3);
        const px = cx + Math.cos(angle + t * 0.2) * r;
        const py = cy + Math.sin(angle + t * 0.2) * r;
        const cr = 12 + Math.random() * 18;
        ctx.beginPath();
        ctx.arc(px, py, cr, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();

    // Rotation highlight
    const hx = cx + Math.cos(t * 0.8) * 50;
    const hy = cy + Math.sin(t * 0.8) * 50;
    ctx.fillStyle = "rgba(255,255,255,0.18)";
    ctx.beginPath();
    ctx.arc(hx, hy, 55, 0, Math.PI * 2);
    ctx.fill();
}

// Life probability meter (0–1)
function lifeProbability(temp, climate, atm, gh) {
    let score = 0;

    // Temperature sweet spot
    if (temp >= 0 && temp <= 40) score += 0.5;
    else if (temp > -20 && temp < 60) score += 0.25;

    // Climate
    if (climate === "Earth-like") score += 0.3;
    else if (climate === "Cold but habitable" || climate === "Hot but habitable") score += 0.15;

    // Atmosphere & greenhouse
    if (atm > 0.2 && atm < 0.8) score += 0.15;
    if (gh > 0.1 && gh < 0.7) score += 0.1;

    return Math.max(0, Math.min(1, score));
}

// Update everything
function update() {
    const L = Number(lumSlider.value);
    const d = Number(distSlider.value);
    const albedo = Number(albedoSlider.value);
    const atm = Number(atmSlider.value);
    const gh = Number(ghSlider.value);

    const tempC = computeTemperature(L, d, albedo, atm, gh);
    const climate = classifyClimate(tempC);

    // Temperature bar
    const percent = Math.min(Math.max((tempC + 50) / 150, 0), 1) * 100;
    tempFill.style.width = percent + "%";

    // Planet + visuals
    drawPlanet(tempC, atm, d);

    // Habitability text
    let habit;
    if (climate === "Earth-like") habit = "✔ Habitable";
    else if (climate === "Cold but habitable") habit = "✔ Possibly habitable";
    else if (climate === "Hot but habitable") habit = "✔ Marginally habitable";
    else habit = "✖ Not habitable";

    // Life probability
    const lifeProb = lifeProbability(tempC, climate, atm, gh);
    lifeFill.style.width = (lifeProb * 100) + "%";

    let lifeText;
    if (lifeProb > 0.7) lifeText = "High chance for complex life";
    else if (lifeProb > 0.4) lifeText = "Moderate chance for life";
    else if (lifeProb > 0.2) lifeText = "Low chance for simple life";
    else lifeText = "Very unlikely environment for life";

    readout.innerHTML = `
        <strong>Temperature:</strong> ${tempC.toFixed(1)} °C<br>
        <strong>Climate:</strong> ${climate}<br>
        <strong>Habitability:</strong> ${habit}<br>
        <strong>Life probability:</strong> ${(lifeProb * 100).toFixed(0)}% — ${lifeText}<br><br>
        Luminosity: ${L.toFixed(2)} • Distance: ${d.toFixed(2)} AU<br>
        Albedo: ${albedo.toFixed(2)} • Atmosphere: ${atm.toFixed(2)} • Greenhouse: ${gh.toFixed(2)}
    `;
}

document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", update);
});

function animate() {
    t += 0.02;
    update();
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>

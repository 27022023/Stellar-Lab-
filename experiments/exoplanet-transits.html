<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exoplanet Transit Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    color: white;
    background-color: #020617; /* dark navy */
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,255,255,0.8) 1px, transparent 3px),
      radial-gradient(circle at 80% 30%, rgba(255,255,255,0.7) 1px, transparent 3px),
      radial-gradient(circle at 50% 80%, rgba(255,255,255,0.6) 1px, transparent 3px),
      radial-gradient(circle at 20% 70%, rgba(255,255,255,0.5) 1px, transparent 3px),
      radial-gradient(circle at 90% 10%, rgba(255,255,255,0.9) 1px, transparent 3px);
    background-attachment: fixed;
  }

  .overlay {
    padding: 40px 20px 80px;
    max-width: 900px;
    margin: auto;
  }

  .moon-home {
    position: fixed;
    left: 15px;
    top: 15px;
    width: 50px;
    height: 50px;
    background: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg') center/cover no-repeat;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 11px;
    color: white;
    text-decoration: none;
    border: 2px solid rgba(255,255,255,0.6);
    box-shadow: 0 0 10px rgba(0,0,0,0.7);
    transition: 0.3s;
    z-index: 10;
  }

  h1, p {
    text-align: center;
  }

  .sim-container {
    background: rgba(15,23,42,0.8); /* deep navy panel */
    border: 1px solid rgba(148,163,184,0.6);
    border-radius: 18px;
    padding: 20px;
    backdrop-filter: blur(12px);
    text-align: center;
  }

  canvas {
    display: block;
    margin: 0 auto;
    background: transparent;
  }

  #graph {
    margin-top: 30px;
    width: 350px;
    height: 200px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    background: transparent;
  }

  details {
    background: rgba(15,23,42,0.9);
    border: 1px solid rgba(148,163,184,0.7);
    border-radius: 12px;
    padding: 12px;
    margin-top: 20px;
    color: white;
  }

  summary {
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 10px;
  }

  .control-box {
    margin-top: 10px;
  }

  .control-box label {
    font-size: 14px;
    font-weight: 600;
  }

  .control-box input {
    width: 100%;
    margin-top: 6px;
  }

  .notebook {
    margin-top: 30px;
    background: repeating-linear-gradient(
      rgba(15,23,42,0.95),
      rgba(15,23,42,0.95) 28px,
      rgba(148,163,184,0.6) 29px
    );
    border-radius: 12px;
    border: 1px solid rgba(148,163,184,0.8);
    padding: 20px;
    min-height: 200px;
    font-size: 16px;
    line-height: 28px;
    outline: none;
    resize: vertical;
    color: white;
  }
</style>
</head>

<body>
<div class="overlay">

<a class="moon-home" href="../experiment.html">Lab</a>

<h1>🔭 Exoplanet Transit Simulator</h1>
<p>Three planets orbiting a star — realistic transits and brightness dips.</p>

<div class="sim-container">

  <canvas id="sim" width="350" height="350"></canvas>

  <details>
    <summary>Planet 1 Controls</summary>
    <div class="control-box">
      <label>Size</label>
      <input type="range" id="p1Size" min="5" max="30" value="12">
    </div>
    <div class="control-box">
      <label>Orbit Speed</label>
      <input type="range" id="p1Speed" min="0.01" max="0.08" step="0.01" value="0.03">
    </div>
    <div class="control-box">
      <label>Orbit Radius</label>
      <input type="range" id="p1Radius" min="60" max="120" value="90">
    </div>
  </details>

  <details>
    <summary>Planet 2 Controls</summary>
    <div class="control-box">
      <label>Size</label>
      <input type="range" id="p2Size" min="10" max="40" value="18">
    </div>
    <div class="control-box">
      <label>Orbit Speed</label>
      <input type="range" id="p2Speed" min="0.01" max="0.06" step="0.01" value="0.02">
    </div>
    <div class="control-box">
      <label>Orbit Radius</label>
      <input type="range" id="p2Radius" min="90" max="160" value="130">
    </div>
  </details>

  <details>
    <summary>Planet 3 Controls</summary>
    <div class="control-box">
      <label>Size</label>
      <input type="range" id="p3Size" min="15" max="60" value="26">
    </div>
    <div class="control-box">
      <label>Orbit Speed</label>
      <input type="range" id="p3Speed" min="0.005" max="0.04" step="0.005" value="0.01">
    </div>
    <div class="control-box">
      <label>Orbit Radius</label>
      <input type="range" id="p3Radius" min="120" max="220" value="180">
    </div>
  </details>

  <details>
    <summary>Star Controls</summary>
    <div class="control-box">
      <label>Brightness</label>
      <input type="range" id="starBrightness" min="0.5" max="1" step="0.01" value="1">
    </div>
  </details>

  <canvas id="graph" width="350" height="200"></canvas>

  <textarea class="notebook" id="notes" placeholder="Write your experiment notes here..."></textarea>

</div>

</div>

<script>
window.onload = function() {
  /* NOTEBOOK MEMORY */
  const notes = document.getElementById("notes");
  notes.value = localStorage.getItem("labNotes") || "";
  notes.addEventListener("input", () => {
    localStorage.setItem("labNotes", notes.value);
  });

  /* CANVAS SETUP */
  const canvas = document.getElementById("sim");
  const ctx = canvas.getContext("2d");

  /* SLIDERS */
  const p1Size = document.getElementById("p1Size");
  const p2Size = document.getElementById("p2Size");
  const p3Size = document.getElementById("p3Size");

  const p1Speed = document.getElementById("p1Speed");
  const p2Speed = document.getElementById("p2Speed");
  const p3Speed = document.getElementById("p3Speed");

  const p1Radius = document.getElementById("p1Radius");
  const p2Radius = document.getElementById("p2Radius");
  const p3Radius = document.getElementById("p3Radius");

  const starBrightnessEl = document.getElementById("starBrightness");

  let angle1 = 0, angle2 = 0, angle3 = 0;

  function drawPlanet(x, y, r, c1, c2) {
    const grad = ctx.createRadialGradient(x - r/3, y - r/3, r/5, x, y, r);
    grad.addColorStop(0, c1);
    grad.addColorStop(1, c2);
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  function drawOrbitRing(radius) {
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, radius, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(148,163,184,0.5)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawSim() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const starX = canvas.width / 2;
    const starY = canvas.height / 2;

    const starBrightness = Number(starBrightnessEl.value);

    const p1 = Number(p1Size.value);
    const p2 = Number(p2Size.value);
    const p3 = Number(p3Size.value);

    const r1 = Number(p1Radius.value);
    const r2 = Number(p2Radius.value);
    const r3 = Number(p3Radius.value);

    const s1 = Number(p1Speed.value);
    const s2 = Number(p2Speed.value);
    const s3 = Number(p3Speed.value);

    ctx.beginPath();
    ctx.arc(starX, starY, 40, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,0,${starBrightness})`;
    ctx.shadowColor = "rgba(250,250,150,0.7)";
    ctx.shadowBlur = 20;
    ctx.fill();
    ctx.shadowBlur = 0;

    drawOrbitRing(r1);
    drawOrbitRing(r2);
    drawOrbitRing(r3);

    angle1 += s1;
    angle2 += s2;
    angle3 += s3;

    const x1 = starX + Math.cos(angle1) * r1;
    const y1 = starY + Math.sin(angle1) * r1;

    const x2 = starX + Math.cos(angle2) * r2;
    const y2 = starY + Math.sin(angle2) * r2;

    const x3 = starX + Math.cos(angle3) * r3;
    const y3 = starY + Math.sin(angle3) * r3;

    drawPlanet(x1, y1, p1, "#38bdf8", "#0ea5e9");
    drawPlanet(x2, y2, p2, "#fb923c", "#f97316");
    drawPlanet(x3, y3, p3, "#a855f7", "#c084fc");

    updateBrightness(x1, y1, p1, x2, y2, p2, x3, y3, p3, starX, starY);
    requestAnimationFrame(drawSim);
  }

  const graph = document.getElementById("graph");
  const g = graph.getContext("2d");
  let brightnessData = [];

  function updateBrightness(px1, py1, p1, px2, py2, p2, px3, py3, p3, sx, sy) {
    let brightness = Number(starBrightnessEl.value);
    const starRadius = 40;

    function transit(px, py, pr) {
      const dx = px - sx;
      const dy = py - sy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < starRadius + pr) brightness -= pr / 200;
    }

    transit(px1, py1, p1);
    transit(px2, py2, p2);
    transit(px3, py3, p3);

    brightnessData.push(brightness);
    if (brightnessData.length > 300) brightnessData.shift();

    drawGraph();
  }

  function drawGraph() {
    g.clearRect(0, 0, graph.width, graph.height);
    if (brightnessData.length === 0) return;

    g.beginPath();
    g.moveTo(0, graph.height - brightnessData[0] * graph.height);

    for (let i = 1; i < brightnessData.length; i++) {
      g.lineTo(i * (graph.width / 300), graph.height - brightnessData[i] * graph.height);
    }

    g.strokeStyle = "white";
    g.lineWidth = 2;
    g.stroke();
  }

  drawSim();
};
</script>

</body>
</html>

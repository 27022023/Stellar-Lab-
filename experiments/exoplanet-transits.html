<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exoplanet Transit Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    color: black;
    background: linear-gradient(135deg,
      rgba(216,191,255,0.55),
      rgba(189,255,214,0.55)
    );
    background-attachment: fixed;
  }

  .overlay {
    padding: 40px 20px 80px;
  }

  /* Moon button moved left */
  .moon-home {
    position: fixed;
    left: 20px;
    top: 20px;
    width: 60px;
    height: 60px;
    background: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg') center/cover no-repeat;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 10px;
    color: black;
    text-decoration: none;
    border: 2px solid rgba(0,0,0,0.4);
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
    transition: 0.3s;
    z-index: 10;
  }

  .moon-home:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
  }

  h1 {
    text-align: center;
    font-size: 36px;
    margin-bottom: 10px;
  }

  p {
    text-align: center;
    font-size: 16px;
    opacity: 0.9;
    margin-bottom: 30px;
  }

  .sim-container {
    max-width: 900px;
    margin: 0 auto;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(0,0,0,0.18);
    border-radius: 18px;
    padding: 20px;
    backdrop-filter: blur(12px);
  }

  canvas {
    display: block;
    margin: 0 auto;
    background: rgba(0,0,0,0.1);
    border-radius: 12px;
  }

  #graph {
    margin-top: 30px;
    width: 100%;
    height: 200px;
    background: rgba(0,0,0,0.1);
    border-radius: 12px;
  }
</style>
</head>

<body>
<div class="overlay">

<a class="moon-home" href="../experiment.html">Lab</a>

<h1>🔭 Exoplanet Transit Simulator</h1>
<p>Three planets orbiting a star — watch realistic transits and brightness dips.</p>

<div class="sim-container">

  <canvas id="sim" width="600" height="300"></canvas>
  <canvas id="graph"></canvas>

</div>

</div>

<script>
/* ------------------ ORBIT SIMULATION ------------------ */

const canvas = document.getElementById("sim");
const ctx = canvas.getContext("2d");

let angle1 = 0;  // inner planet
let angle2 = 0;  // middle planet
let angle3 = 0;  // outer planet

function drawPlanet(x, y, r, color1, color2) {
  const gradient = ctx.createRadialGradient(x - r/3, y - r/3, r/5, x, y, r);
  gradient.addColorStop(0, color1);
  gradient.addColorStop(1, color2);

  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();
}

function drawSim() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const starX = canvas.width / 2;
  const starY = canvas.height / 2;

  /* STAR — much bigger now */
  ctx.beginPath();
  ctx.arc(starX, starY, 55, 0, Math.PI * 2);
  ctx.fillStyle = "yellow";
  ctx.fill();

  /* REALISTIC PLANET SIZES */
  const p1 = 12;  // Earth-like
  const p2 = 18;  // Super-Earth
  const p3 = 26;  // Neptune-like

  /* ORBIT RADII (spread-out system) */
  const r1 = 110;
  const r2 = 160;
  const r3 = 210;

  /* ORBIT SPEEDS */
  angle1 += 0.03;  // fast inner planet
  angle2 += 0.02;  // medium
  angle3 += 0.01;  // slow outer planet

  /* PLANET POSITIONS */
  const x1 = starX + Math.cos(angle1) * r1;
  const y1 = starY + Math.sin(angle1) * r1;

  const x2 = starX + Math.cos(angle2) * r2;
  const y2 = starY + Math.sin(angle2) * r2;

  const x3 = starX + Math.cos(angle3) * r3;
  const y3 = starY + Math.sin(angle3) * r3;

  /* DRAW REALISTIC PLANETS */
  drawPlanet(x1, y1, p1, "#1e3a8a", "#60a5fa");  // deep blue
  drawPlanet(x2, y2, p2, "#b45309", "#fbbf24");  // orange rocky
  drawPlanet(x3, y3, p3, "#6b21a8", "#c084fc");  // purple ice giant

  updateBrightness(x1, y1, p1, x2, y2, p2, x3, y3, p3, starX, starY);
  requestAnimationFrame(drawSim);
}

drawSim();

/* ------------------ LIGHT CURVE GRAPH ------------------ */

const graph = document.getElementById("graph");
const g = graph.getContext("2d");

let brightnessData = [];

function updateBrightness(px1, py1, p1, px2, py2, p2, px3, py3, p3, sx, sy) {
  let brightness = 1;

  const starRadius = 55;

  function checkTransit(px, py, pr) {
    const dx = px - sx;
    const dy = py - sy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < starRadius + pr) {
      brightness -= pr / 200;  // realistic dip scaling
    }
  }

  checkTransit(px1, py1, p1);
  checkTransit(px2, py2, p2);
  checkTransit(px3, py3, p3);

  brightnessData.push(brightness);
  if (brightnessData.length > 300) brightnessData.shift();

  drawGraph();
}

function drawGraph() {
  g.clearRect(0, 0, graph.width, graph.height);

  g.beginPath();
  g.moveTo(0, graph.height - brightnessData[0] * graph.height);

  for (let i = 1; i < brightnessData.length; i++) {
    g.lineTo(i * (graph.width / 300), graph.height - brightnessData[i] * graph.height);
  }

  g.strokeStyle = "black";
  g.lineWidth = 2;
  g.stroke();
}
</script>

</body>
</html>

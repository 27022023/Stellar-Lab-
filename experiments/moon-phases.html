<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moon Phases Experiment</title>
<style>
body {
    background: #020617;
    color: #e5e7eb;
    font-family: Inter, sans-serif;
    padding: 40px;
    text-align: center;
}

/* BIG LAB MOON BUTTON */
.moon-home {
    position: fixed;
    left: 20px;
    top: 20px;
    width: 120px;
    height: 120px;
    background: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg') center/cover no-repeat;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 18px;
    color: white;
    text-decoration: none;
    border: 3px solid rgba(255,255,255,0.8);
    box-shadow: 0 0 25px rgba(0,0,0,0.9);
    z-index: 999;
}

h1 {
    font-size: 48px;
    margin-bottom: 8px;
    color: #f9fafb;
}

p {
    font-size: 20px;
    opacity: 0.9;
    margin-bottom: 10px;
}

canvas {
    background: #020617;
    border-radius: 20px;
    margin-top: 30px;
    box-shadow: 0 0 40px rgba(15,23,42,0.9);
}

#controls {
    margin-top: 20px;
    font-size: 16px;
}

button {
    margin: 6px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid #4b5563;
    background: #0f172a;
    color: #e5e7eb;
    cursor: pointer;
}
button.active {
    border-color: #22c55e;
    color: #f9fafb;
}

#readout {
    margin-top: 30px;
    padding: 22px;
    background: #0f172a;
    border-radius: 12px;
    font-size: 22px;
    line-height: 1.6;
    border: 1px solid #1f2937;
}
</style>
</head>

<body>

<a class="moon-home" href="../experiment.html">Lab</a>

<h1>Moon Phases</h1>
<p>Drag the Moon, watch phases update, and see the real moon phase for your current location and time.</p>

<div id="controls">
    <button id="orbitBtn">Auto orbit: OFF</button>
    <button id="eclipseBtn">Eclipse mode: OFF</button>
</div>

<canvas id="moonCanvas" width="900" height="900"></canvas>

<div id="readout">Phase will appear here.</div>

<script>
const canvas = document.getElementById("moonCanvas");
const ctx = canvas.getContext("2d");

let moonAngle = Math.PI / 2;
let dragging = false;
let autoOrbit = false;
let eclipseMode = false;
let t = 0;

const cx = canvas.width / 2;
const cy = canvas.height / 2;
const earthR = 110;
const moonOrbitR = 320;
const moonR = 60;

const orbitBtn = document.getElementById("orbitBtn");
const eclipseBtn = document.getElementById("eclipseBtn");
const readout = document.getElementById("readout");

let userLocationText = "Location: unknown (geolocation not allowed)";
let userTimeText = "";

/* USER LOCATION (approx) */
function initLocation() {
    const now = new Date();
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "Unknown time zone";
    userTimeText = now.toLocaleString() + " (" + tz + ")";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            userLocationText = `Location: lat ${latitude.toFixed(2)}, lon ${longitude.toFixed(2)} (device-based)`;
        }, () => {
            userLocationText = `Location: device time zone (${tz})`;
        });
    } else {
        userLocationText = `Location: device time zone (${tz})`;
    }
}

/* JULIAN DATE + REAL MOON PHASE */
function julianDate(date) {
    return date / 86400000 + 2440587.5;
}

function realMoonPhase() {
    const now = new Date();
    const jd = julianDate(now);
    const days = (jd - 2451550.1) % 29.530588853;
    const age = days < 0 ? days + 29.530588853 : days;
    const illumination = (1 - Math.cos(2 * Math.PI * age / 29.53)) / 2;

    let name = "";
    if (age < 1.84566) name = "New Moon";
    else if (age < 5.53699) name = "Waxing Crescent";
    else if (age < 9.22831) name = "First Quarter";
    else if (age < 12.91963) name = "Waxing Gibbous";
    else if (age < 16.61096) name = "Full Moon";
    else if (age < 20.30228) name = "Waning Gibbous";
    else if (age < 23.99361) name = "Last Quarter";
    else if (age < 27.68493) name = "Waning Crescent";
    else name = "New Moon";

    return {
        name,
        age: age.toFixed(2),
        illumination: (illumination * 100).toFixed(1)
    };
}

/* STARS BACKGROUND */
function drawStars() {
    ctx.fillStyle = "#020617";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.fillStyle = "rgba(148,163,184,0.6)";
    for (let i = 0; i < 160; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const r = Math.random() * 1.8;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

/* PHASE NAME FOR INTERACTIVE ANGLE */
function getPhaseName(angle) {
    const deg = (angle * 180 / Math.PI + 360) % 360;
    if (deg < 22.5 || deg > 337.5) return "New Moon";
    if (deg < 67.5) return "Waxing Crescent";
    if (deg < 112.5) return "First Quarter";
    if (deg < 157.5) return "Waxing Gibbous";
    if (deg < 202.5) return "Full Moon";
    if (deg < 247.5) return "Waning Gibbous";
    if (deg < 292.5) return "Last Quarter";
    return "Waning Crescent";
}

/* REALISTIC-STYLE MOON TEXTURE (noise craters) */
function drawMoonTexture() {
    const imgData = ctx.getImageData(cx - moonOrbitR - moonR - 10, cy - moonOrbitR - moonR - 10,
                                     canvas.width, canvas.height);
    // (We’ll keep this simple: main texture is done inside moon drawing using noise)
}

/* MAIN DRAW */
function draw() {
    drawStars();

    const real = realMoonPhase();

    // Sun glow (left)
    const sx = cx - 350;
    const sy = cy - 80;
    const baseR = 120;
    const pulse = 1 + Math.sin(t * 1.2) * 0.15;
    const sunGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, baseR * 3 * pulse);
    sunGrad.addColorStop(0, "#ffffff");
    sunGrad.addColorStop(0.3, "#fde68a");
    sunGrad.addColorStop(1, "rgba(251,191,36,0)");
    ctx.fillStyle = sunGrad;
    ctx.beginPath();
    ctx.arc(sx, sy, baseR * 3 * pulse, 0, Math.PI * 2);
    ctx.fill();

    // Earth with day/night
    const earthGrad = ctx.createRadialGradient(cx - 40, cy - 40, 0, cx, cy, earthR * 1.4);
    earthGrad.addColorStop(0, "#3b82f6");
    earthGrad.addColorStop(0.5, "#1d4ed8");
    earthGrad.addColorStop(1, "#020617");
    ctx.fillStyle = earthGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, earthR, 0, Math.PI * 2);
    ctx.fill();

    // Earth night side overlay
    ctx.save();
    const nightGrad = ctx.createRadialGradient(cx + 40, cy + 40, 0, cx, cy, earthR * 1.5);
    nightGrad.addColorStop(0, "rgba(0,0,0,0.0)");
    nightGrad.addColorStop(1, "rgba(15,23,42,0.85)");
    ctx.fillStyle = nightGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, earthR * 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Orbit ring
    ctx.save();
    ctx.strokeStyle = "rgba(148,163,184,0.4)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, moonOrbitR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Moon position
    const mx = cx + Math.cos(moonAngle) * moonOrbitR;
    const my = cy + Math.sin(moonAngle) * moonOrbitR;

    // Eclipse mode: if moon is near line between Earth and Sun, darken Earth or Sun
    if (eclipseMode) {
        const angleToSun = Math.atan2(sy - cy, sx - cx);
        const diff = Math.abs(((moonAngle - angleToSun + Math.PI * 2) % (Math.PI * 2)) - Math.PI);
        if (diff < 0.25) {
            // Lunar eclipse (Earth between Sun and Moon)
            ctx.save();
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.beginPath();
            ctx.arc(mx, my, moonR + 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        } else if (diff > (Math.PI * 2 - 0.25) || diff < 0.25) {
            // Solar-ish eclipse (Moon between Sun and Earth) – simple visual
            ctx.save();
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.beginPath();
            ctx.arc(cx, cy, earthR + 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // Moon: realistic-style with texture + phase shadow
    ctx.save();
    ctx.translate(mx, my);

    // Base moon
    ctx.fillStyle = "#e5e7eb";
    ctx.beginPath();
    ctx.arc(0, 0, moonR, 0, Math.PI * 2);
    ctx.fill();

    // Texture via noise
    const imgData = ctx.getImageData(-moonR, -moonR, moonR * 2, moonR * 2);
    for (let y = 0; y < imgData.height; y++) {
        for (let x = 0; x < imgData.width; x++) {
            const dx = x - moonR;
            const dy = y - moonR;
            if (dx * dx + dy * dy <= moonR * moonR) {
                const idx = (y * imgData.width + x) * 4;
                const nx = (x + mx) * 0.03;
                const ny = (y + my) * 0.03;
                const n = (Math.sin(nx * 12.9898 + ny * 78.233 + 43758.5453) * 43758.5453) % 1;
                const crater = n * 0.25;
                imgData.data[idx] *= 1 - crater;
                imgData.data[idx + 1] *= 1 - crater;
                imgData.data[idx + 2] *= 1 - crater;
            }
        }
    }
    ctx.putImageData(imgData, -moonR, -moonR);

    // Phase shadow
    const phase = Math.cos(moonAngle);
    ctx.globalCompositeOperation = "source-atop";
    ctx.fillStyle = "#111827";
    ctx.beginPath();
    ctx.arc(phase * moonR, 0, moonR, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Readout
    const interactivePhase = getPhaseName(moonAngle);
    readout.innerHTML = `
        <strong>Interactive phase (drag the Moon):</strong> ${interactivePhase}<br>
        <strong>Real moon phase now:</strong> ${real.name}<br>
        <strong>Illumination:</strong> ${real.illumination}%<br>
        <strong>Moon age:</strong> ${real.age} days since new moon<br>
        ${userLocationText}<br>
        <strong>Current time:</strong> ${userTimeText}
    `;
}

/* DRAGGING */
canvas.addEventListener("mousedown", () => { dragging = true; });
canvas.addEventListener("mouseup", () => { dragging = false; });
canvas.addEventListener("mouseleave", () => { dragging = false; });

canvas.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left - cx;
    const y = e.clientY - rect.top - cy;
    moonAngle = Math.atan2(y, x);
    draw();
});

/* ORBIT + ECLIPSE BUTTONS */
orbitBtn.addEventListener("click", () => {
    autoOrbit = !autoOrbit;
    orbitBtn.textContent = autoOrbit ? "Auto orbit: ON" : "Auto orbit: OFF";
    orbitBtn.classList.toggle("active", autoOrbit);
});

eclipseBtn.addEventListener("click", () => {
    eclipseMode = !eclipseMode;
    eclipseBtn.textContent = eclipseMode ? "Eclipse mode: ON" : "Eclipse mode: OFF";
    eclipseBtn.classList.toggle("active", eclipseMode);
    draw();
});

/* ANIMATION LOOP */
function animate() {
    t += 0.01;
    if (autoOrbit && !dragging) {
        moonAngle += 0.003; // slow cinematic orbit
    }
    draw();
    requestAnimationFrame(animate);
}

initLocation();
animate();
</script>

</body>
</html>

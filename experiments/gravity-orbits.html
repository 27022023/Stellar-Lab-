<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity & Orbits Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    color: white;
    background-color: #020617;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,255,255,0.8) 1px, transparent 3px),
      radial-gradient(circle at 80% 30%, rgba(255,255,255,0.7) 1px, transparent 3px),
      radial-gradient(circle at 50% 80%, rgba(255,255,255,0.6) 1px, transparent 3px),
      radial-gradient(circle at 20% 70%, rgba(255,255,255,0.5) 1px, transparent 3px),
      radial-gradient(circle at 90% 10%, rgba(255,255,255,0.9) 1px, transparent 3px);
    background-attachment: fixed;
  }

  .overlay {
    padding: 40px 20px 80px;
    max-width: 900px;
    margin: auto;
  }

  .moon-home {
    position: fixed;
    left: 15px;
    top: 15px;
    width: 50px;
    height: 50px;
    background: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg') center/cover no-repeat;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 11px;
    color: white;
    text-decoration: none;
    border: 2px solid rgba(255,255,255,0.6);
    box-shadow: 0 0 10px rgba(0,0,0,0.7);
    transition: 0.3s;
    z-index: 10;
  }

  h1, p {
    text-align: center;
  }

  .sim-container {
    background: rgba(15,23,42,0.9);
    border: 1px solid rgba(148,163,184,0.6);
    border-radius: 18px;
    padding: 20px;
    backdrop-filter: blur(12px);
    text-align: center;
  }

  canvas {
    display: block;
    margin: 0 auto;
    background: transparent;
    border-radius: 12px;
  }

  .controls-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 15px;
    justify-content: center;
  }

  .controls-row button {
    background: rgba(30,64,175,0.9);
    border: 1px solid rgba(148,163,184,0.8);
    color: white;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
  }

  .controls-row button:hover {
    background: rgba(59,130,246,0.9);
  }

  details {
    background: rgba(15,23,42,0.95);
    border: 1px solid rgba(148,163,184,0.7);
    border-radius: 12px;
    padding: 12px;
    margin-top: 20px;
    color: white;
  }

  summary {
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 10px;
  }

  .control-box {
    margin-top: 10px;
  }

  .control-box label {
    font-size: 14px;
    font-weight: 600;
  }

  .control-box input,
  .control-box select {
    width: 100%;
    margin-top: 6px;
  }

  .notebook {
    margin-top: 30px;
    background: repeating-linear-gradient(
      rgba(15,23,42,0.95),
      rgba(15,23,42,0.95) 28px,
      rgba(148,163,184,0.6) 29px
    );
    border-radius: 12px;
    border: 1px solid rgba(148,163,184,0.8);
    padding: 20px;
    min-height: 200px;
    font-size: 16px;
    line-height: 28px;
    outline: none;
    resize: vertical;
    color: white;
  }
</style>
</head>

<body>
<div class="overlay">

<a class="moon-home" href="../experiment.html">Lab</a>

<h1>🌌 Gravity & Orbits Lab</h1>
<p>Real Newtonian gravity — planets, moons, comets, and glowing orbital trails.</p>

<div class="sim-container">

  <canvas id="gravityCanvas" width="350" height="350"></canvas>

  <div class="controls-row">
    <button id="resetBtn">Reset</button>
    <button id="randomPlanetBtn">Random Planet</button>
    <button id="spawnSystemBtn">Spawn System</button>
    <button id="addMoonBtn">Add Moon to Last Planet</button>
    <button id="addCometBtn">Add Comet</button>
  </div>

  <details>
    <summary>Add Planet (sliders)</summary>
    <div class="control-box">
      <label>Mass</label>
      <input type="range" id="massSlider" min="1" max="50" value="10">
    </div>
    <div class="control-box">
      <label>Size</label>
      <input type="range" id="sizeSlider" min="4" max="20" value="8">
    </div>
    <div class="control-box">
      <label>Initial Speed</label>
      <input type="range" id="speedSlider" min="0" max="4" step="0.1" value="1.5">
    </div>
    <div class="control-box">
      <label>Color</label>
      <select id="colorSelect">
        <option value="#38bdf8">Blue</option>
        <option value="#fb923c">Orange</option>
        <option value="#a855f7">Purple</option>
        <option value="#22c55e">Green</option>
        <option value="#facc15">Yellow</option>
      </select>
    </div>
    <div class="control-box">
      <button id="addPlanetBtn">Add Planet at Center</button>
    </div>
  </details>

  <details>
    <summary>Gravity & Trails</summary>
    <div class="control-box">
      <label>Gravity Strength (hybrid)</label>
      <input type="range" id="gravitySlider" min="0.1" max="2" step="0.1" value="1">
    </div>
    <div class="control-box">
      <label>Trail Length</label>
      <input type="range" id="trailSlider" min="20" max="200" value="80">
    </div>
  </details>

  <details>
    <summary>Quick Planet Toolbar</summary>
    <div class="controls-row">
      <button class="toolbarPlanet" data-color="#38bdf8" data-mass="8" data-size="6">Blue</button>
      <button class="toolbarPlanet" data-color="#fb923c" data-mass="12" data-size="8">Orange</button>
      <button class="toolbarPlanet" data-color="#a855f7" data-mass="15" data-size="9">Purple</button>
      <button class="toolbarPlanet" data-color="#22c55e" data-mass="6" data-size="5">Green</button>
    </div>
    <p style="font-size:12px;margin-top:8px;">Tap on the canvas to place planets. Toolbar sets the style.</p>
  </details>

  <textarea class="notebook" id="notes" placeholder="Write your gravity & orbits notes here..."></textarea>

</div>

</div>

<script>
window.onload = function() {
  /* NOTEBOOK MEMORY */
  const notes = document.getElementById("notes");
  notes.value = localStorage.getItem("gravityLabNotes") || "";
  notes.addEventListener("input", () => {
    localStorage.setItem("gravityLabNotes", notes.value);
  });

  const canvas = document.getElementById("gravityCanvas");
  const ctx = canvas.getContext("2d");

  const resetBtn = document.getElementById("resetBtn");
  const randomPlanetBtn = document.getElementById("randomPlanetBtn");
  const spawnSystemBtn = document.getElementById("spawnSystemBtn");
  const addPlanetBtn = document.getElementById("addPlanetBtn");
  const addMoonBtn = document.getElementById("addMoonBtn");
  const addCometBtn = document.getElementById("addCometBtn");
  const gravitySlider = document.getElementById("gravitySlider");
  const trailSlider = document.getElementById("trailSlider");
  const massSlider = document.getElementById("massSlider");
  const sizeSlider = document.getElementById("sizeSlider");
  const speedSlider = document.getElementById("speedSlider");
  const colorSelect = document.getElementById("colorSelect");
  const toolbarPlanets = document.querySelectorAll(".toolbarPlanet");

  let bodies = [];
  let trails = [];
  let currentToolbarPlanet = { color: "#38bdf8", mass: 8, size: 6 };

  const G_BASE = 0.05; // base gravity constant
  let gravityScale = Number(gravitySlider.value);
  let trailLength = Number(trailSlider.value);

  toolbarPlanets.forEach(btn => {
    btn.addEventListener("click", () => {
      currentToolbarPlanet = {
        color: btn.dataset.color,
        mass: Number(btn.dataset.mass),
        size: Number(btn.dataset.size)
      };
    });
  });

  canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    addBody(x, y,
      currentToolbarPlanet.mass,
      currentToolbarPlanet.size,
      currentToolbarPlanet.color,
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 2,
      "planet",
      null
    );
  });

  function addBody(x, y, mass, radius, color, vx, vy, type = "planet", parentIndex = null) {
    bodies.push({ x, y, vx, vy, ax: 0, ay: 0, mass, radius, color, type, parentIndex });
    trails.push([]);
  }

  function spawnDefaultSystem() {
    bodies = [];
    trails = [];

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    addBody(cx, cy, 200, 12, "#facc15", 0, 0, "star", null);

    addBody(cx + 70, cy, 10, 6, "#38bdf8", 0, 1.8, "planet", null);
    addBody(cx - 110, cy, 15, 7, "#fb923c", 0, -1.4, "planet", null);
    addBody(cx, cy + 140, 20, 8, "#a855f7", -1.6, 0, "planet", null);
  }

  spawnDefaultSystem();

  addPlanetBtn.addEventListener("click", () => {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const mass = Number(massSlider.value);
    const size = Number(sizeSlider.value);
    const speed = Number(speedSlider.value);
    const color = colorSelect.value;

    addBody(cx + 80, cy, mass, size, color, 0, speed, "planet", null);
  });

  randomPlanetBtn.addEventListener("click", () => {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    const mass = 5 + Math.random() * 30;
    const size = 4 + Math.random() * 10;
    const colorList = ["#38bdf8","#fb923c","#a855f7","#22c55e","#facc15"];
    const color = colorList[Math.floor(Math.random() * colorList.length)];
    const vx = (Math.random() - 0.5) * 3;
    const vy = (Math.random() - 0.5) * 3;

    addBody(x, y, mass, size, color, vx, vy, "planet", null);
  });

  spawnSystemBtn.addEventListener("click", () => {
    spawnDefaultSystem();
  });

  resetBtn.addEventListener("click", () => {
    bodies = [];
    trails = [];
  });

  gravitySlider.addEventListener("input", () => {
    gravityScale = Number(gravitySlider.value);
  });

  trailSlider.addEventListener("input", () => {
    trailLength = Number(trailSlider.value);
  });

  addMoonBtn.addEventListener("click", () => {
    if (bodies.length <= 1) return;

    let parentIndex = bodies.length - 1;
    if (bodies[parentIndex].type === "star" && bodies.length > 2) {
      parentIndex = 1;
    }

    const parent = bodies[parentIndex];
    const angle = Math.random() * Math.PI * 2;
    const distance = parent.radius + 20;
    const x = parent.x + Math.cos(angle) * distance;
    const y = parent.y + Math.sin(angle) * distance;

    const orbitalSpeed = 2.2;
    const vx = parent.vx - Math.sin(angle) * orbitalSpeed;
    const vy = parent.vy + Math.cos(angle) * orbitalSpeed;

    addBody(x, y, parent.mass * 0.05, parent.radius * 0.4, "#9ca3af", vx, vy, "moon", parentIndex);
  });

  addCometBtn.addEventListener("click", () => {
    const edge = Math.floor(Math.random() * 4);
    let x, y, vx, vy;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    if (edge === 0) { x = 0; y = Math.random() * canvas.height; }
    else if (edge === 1) { x = canvas.width; y = Math.random() * canvas.height; }
    else if (edge === 2) { x = Math.random() * canvas.width; y = 0; }
    else { x = Math.random() * canvas.width; y = canvas.height; }

    const dx = cx - x;
    const dy = cy - y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const speed = 4.5;
    vx = (dx / dist) * speed + (Math.random() - 0.5) * 1.5;
    vy = (dy / dist) * speed + (Math.random() - 0.5) * 1.5;

    addBody(x, y, 5, 4, "#38bdf8", vx, vy, "comet", null);
  });

  function updatePhysics() {
    for (let i = 0; i < bodies.length; i++) {
      bodies[i].ax = 0;
      bodies[i].ay = 0;
    }

    for (let i = 0; i < bodies.length; i++) {
      for (let j = i + 1; j < bodies.length; j++) {
        const bi = bodies[i];
        const bj = bodies[j];

        const dx = bj.x - bi.x;
        const dy = bj.y - bi.y;
        const distSq = dx*dx + dy*dy;
        const dist = Math.sqrt(distSq) || 0.0001;

        const force = (G_BASE * gravityScale * bi.mass * bj.mass) / distSq;
        const fx = force * dx / dist;
        const fy = force * dy / dist;

        bi.ax += fx / bi.mass;
        bi.ay += fy / bi.mass;

        bj.ax -= fx / bj.mass;
        bj.ay -= fy / bj.mass;

        if (dist < bi.radius + bj.radius && bi.type !== "comet" && bj.type !== "comet") {
          const totalMass = bi.mass + bj.mass;
          const newX = (bi.x * bi.mass + bj.x * bj.mass) / totalMass;
          const newY = (bi.y * bi.mass + bj.y * bj.mass) / totalMass;
          const newVx = (bi.vx * bi.mass + bj.vx * bj.mass) / totalMass;
          const newVy = (bi.vy * bi.mass + bj.vy * bj.mass) / totalMass;
          const newRadius = Math.sqrt(bi.radius*bi.radius + bj.radius*bj.radius);
          const newColor = "#f97316";

          bodies[i] = { x: newX, y: newY, vx: newVx, vy: newVy, ax: 0, ay: 0, mass: totalMass, radius: newRadius, color: newColor, type: "planet", parentIndex: null };
          bodies.splice(j, 1);
          trails.splice(j, 1);
          j--;
        }
      }
    }

    for (let i = 0; i < bodies.length; i++) {
      const b = bodies[i];
      b.vx += b.ax;
      b.vy += b.ay;
      b.x += b.vx;
      b.y += b.vy;

      if (b.x < 0) b.x = canvas.width;
      if (b.x > canvas.width) b.x = 0;
      if (b.y < 0) b.y = canvas.height;
      if (b.y > canvas.height) b.y = 0;

      trails[i].push({ x: b.x, y: b.y });
      if (trails[i].length > trailLength) trails[i].shift();
    }
  }

  function drawScene() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(2,6,23,0.6)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255,255,255,0.6)";
    for (let i = 0; i < 80; i++) {
      const sx = Math.random() * canvas.width;
      const sy = Math.random() * canvas.height;
      ctx.fillRect(sx, sy, 1, 1);
    }

    for (let i = 0; i < trails.length; i++) {
      const t = trails[i];
      if (t.length < 2) continue;
      ctx.beginPath();
      ctx.moveTo(t[0].x, t[0].y);
      for (let k = 1; k < t.length; k++) {
        ctx.lineTo(t[k].x, t[k].y);
      }
      const b = bodies[i];
      if (b.type === "comet") {
        ctx.strokeStyle = "rgba(56,189,248,0.9)";
      } else if (b.type === "moon") {
        ctx.strokeStyle = "rgba(148,163,184,0.8)";
      } else {
        ctx.strokeStyle = "rgba(148,163,184,0.7)";
      }
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    for (let i = 0; i < bodies.length; i++) {
      const b = bodies[i];
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);

      if (b.type === "moon") {
        ctx.fillStyle = "#9ca3af";
        ctx.shadowColor = "#e5e7eb";
        ctx.shadowBlur = 8;
      } else if (b.type === "comet") {
        const grad = ctx.createRadialGradient(b.x - b.radius/3, b.y - b.radius/3, b.radius/5, b.x, b.y, b.radius);
        grad.addColorStop(0, "#e0f2fe");
        grad.addColorStop(1, "#38bdf8");
        ctx.fillStyle = grad;
        ctx.shadowColor = "#38bdf8";
        ctx.shadowBlur = 15;

        const tailLen = 18;
        const tailX = b.x - b.vx * tailLen;
        const tailY = b.y - b.vy * tailLen;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(tailX, tailY);
        ctx.strokeStyle = "rgba(56,189,248,0.8)";
        ctx.lineWidth = 2;
        ctx.stroke();
      } else if (b.type === "star") {
        const grad = ctx.createRadialGradient(b.x - b.radius/3, b.y - b.radius/3, b.radius/5, b.x, b.y, b.radius);
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(1, "#facc15");
        ctx.fillStyle = grad;
        ctx.shadowColor = "#facc15";
        ctx.shadowBlur = 20;
      } else {
        const grad = ctx.createRadialGradient(b.x - b.radius/3, b.y - b.radius/3, b.radius/5, b.x, b.y, b.radius);
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(1, b.color);
        ctx.fillStyle = grad;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 15;
      }

      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  function loop() {
    updatePhysics();
    drawScene();
    requestAnimationFrame(loop);
  }

  loop();
};
</script>

</body>
</html>
